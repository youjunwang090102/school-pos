<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後廚與發餐系統 (KDS Pro)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { overflow: hidden; user-select: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-900 h-screen w-screen flex flex-col font-sans text-slate-100">

  <header class="bg-slate-950 p-4 flex justify-between items-center shadow-xl border-b border-slate-800 shrink-0 z-20">
    <div class="flex items-center space-x-4">
      <div class="bg-orange-600 w-12 h-12 rounded-xl flex items-center justify-center shadow-lg">
        <i class="fa-solid fa-fire-burner text-white text-2xl"></i>
      </div>
      <div>
        <h1 class="text-2xl font-black tracking-widest text-slate-100">後廚與發餐控單中心</h1>
        <p class="text-xs font-bold text-slate-500 tracking-widest uppercase">Kitchen & Expo Display System</p>
      </div>
    </div>
    <div class="flex items-center space-x-3 bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
      <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
      <span class="text-emerald-400 font-bold text-sm tracking-widest">即時同步中</span>
    </div>
  </header>

  <main class="flex-1 flex overflow-hidden">
    
    <section class="w-1/2 flex flex-col border-r border-slate-700 bg-slate-800">
      <div class="bg-slate-800 p-4 flex justify-between items-center shrink-0 border-b border-slate-700 shadow-md z-10">
        <h2 class="text-2xl font-black text-orange-400 tracking-widest"><i class="fa-solid fa-fire mr-2"></i>待製作 (Pending)</h2>
        <span id="pending-count" class="bg-orange-500 text-white font-bold px-3 py-1 rounded-full text-sm">0</span>
      </div>
      
      <div id="pending-list" class="flex-1 overflow-y-auto p-6 space-y-6 no-scrollbar bg-slate-800/50">
        </div>
    </section>

    <section class="w-1/2 flex flex-col bg-slate-900 relative">
      <div class="absolute inset-0 bg-emerald-900/5 pointer-events-none"></div>
      <div class="bg-slate-900 p-4 flex justify-between items-center shrink-0 border-b border-emerald-900/50 shadow-md z-10">
        <h2 class="text-2xl font-black text-emerald-400 tracking-widest"><i class="fa-solid fa-bell-concierge mr-2"></i>待取餐 / 叫號中 (Ready)</h2>
        <span id="ready-count" class="bg-emerald-500 text-white font-bold px-3 py-1 rounded-full text-sm">0</span>
      </div>
      
      <div id="ready-list" class="flex-1 overflow-y-auto p-6 grid grid-cols-2 gap-4 no-scrollbar items-start content-start">
        </div>
    </section>
  </main>

  <script type="module">
    import { db, collection } from './firebase-config.js';
    import { query, where, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const ordersRef = collection(db, "orders");

    // ----------------------------------------
    // 功能 1：監聽「待製作」訂單 (Pending)
    // ----------------------------------------
    onSnapshot(query(ordersRef, where("status", "==", "pending"), orderBy("timestamp", "asc")), (snapshot) => {
      document.getElementById('pending-count').innerText = snapshot.size;
      const list = document.getElementById('pending-list');
      
      if (snapshot.empty) {
        list.innerHTML = `
          <div class="h-full flex flex-col items-center justify-center text-slate-500 opacity-50">
            <i class="fa-solid fa-mug-hot text-7xl mb-6"></i>
            <p class="text-2xl font-bold tracking-widest">目前無待製作訂單</p>
          </div>`;
        return;
      }

      list.innerHTML = snapshot.docs.map((docSnap, index) => {
        const order = docSnap.data();
        const timeStr = order.timestamp ? order.timestamp.toDate().toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit'}) : '剛剛';
        const itemsHtml = order.items.map(item => `
          <div class="flex justify-between items-center bg-slate-900 p-4 rounded-xl mb-2 border border-slate-700 shadow-inner">
            <span class="font-bold text-xl text-slate-200">${item.name}</span>
            <span class="text-orange-400 font-black text-2xl">x ${item.qty}</span>
          </div>
        `).join('');

        return `
          <div class="bg-slate-700 border border-slate-600 rounded-2xl flex flex-col overflow-hidden shadow-xl animate-slide-in" style="animation-delay: ${index * 0.05}s">
            <div class="bg-slate-800 p-5 flex justify-between items-center border-b border-slate-600">
              <span class="text-4xl font-black text-white tracking-tighter drop-shadow-md">#${order.orderNumber}</span>
              <span class="text-slate-400 font-bold text-lg"><i class="fa-regular fa-clock mr-2"></i>${timeStr}</span>
            </div>
            <div class="p-5 flex-1">${itemsHtml}</div>
            <div class="p-4 bg-slate-800 border-t border-slate-600">
              <button onclick="updateOrderStatus('${docSnap.id}', 'ready')" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black text-2xl py-5 rounded-xl shadow-[0_0_15px_rgba(234,88,12,0.4)] active:scale-[0.98] transition">
                <i class="fa-solid fa-bell mr-2"></i> 完成出餐 (呼叫客人)
              </button>
            </div>
          </div>
        `;
      }).join('');
    });

    // ----------------------------------------
    // 功能 2：監聽「待取餐」訂單 (Ready)
    // ----------------------------------------
    onSnapshot(query(ordersRef, where("status", "==", "ready"), orderBy("timestamp", "asc")), (snapshot) => {
      document.getElementById('ready-count').innerText = snapshot.size;
      const list = document.getElementById('ready-list');
      
      if (snapshot.empty) {
        list.innerHTML = `
          <div class="col-span-2 h-64 flex flex-col items-center justify-center text-slate-600 opacity-50 mt-20">
            <i class="fa-solid fa-box-open text-7xl mb-6"></i>
            <p class="text-xl font-bold tracking-widest">目前無待取餐點</p>
          </div>`;
        return;
      }

      list.innerHTML = snapshot.docs.map((docSnap, index) => {
        const order = docSnap.data();
        const itemsBrief = order.items.map(item => `${item.name} x${item.qty}`).join(', ');

        return `
          <div class="bg-emerald-900/40 border border-emerald-700/50 rounded-2xl flex flex-col overflow-hidden shadow-lg animate-slide-in" style="animation-delay: ${index * 0.05}s">
            <div class="p-4 flex justify-center items-center border-b border-emerald-800/50 bg-emerald-950/50">
              <span class="text-5xl font-black text-emerald-400 tracking-tighter drop-shadow-md">#${order.orderNumber}</span>
            </div>
            <div class="p-3 bg-slate-900/50 text-slate-400 text-sm font-bold text-center truncate">
              ${itemsBrief}
            </div>
            <div class="p-3">
              <button onclick="updateOrderStatus('${docSnap.id}', 'completed')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black text-lg py-4 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.3)] active:scale-[0.95] transition">
                <i class="fa-solid fa-check-double mr-2"></i> 客人已取餐
              </button>
            </div>
          </div>
        `;
      }).join('');
    });

    // ----------------------------------------
    // 核心更新狀態函式
    // ----------------------------------------
    window.updateOrderStatus = async function(orderId, newStatus) {
      try {
        await updateDoc(doc(db, "orders", orderId), { status: newStatus });
      } catch (e) {
        alert("狀態更新失敗，請檢查網路連線！");
        console.error(e);
      }
    };
  </script>
</body>
</html>
