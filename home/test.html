<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ClassPOS - 支援自助點餐</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { user-select: none; -webkit-user-select: none; overflow: hidden; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .receipt-edge { background-image: radial-gradient(circle at 10px 0, transparent 10px, white 11px); background-size: 20px 20px; background-repeat: repeat-x; }
    #admin-menu:not(.hidden) { display: flex; }
    
    /* 購物車動畫按鈕縮放 */
    @keyframes badgeBump {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
    .badge-bump { animation: badgeBump 0.3s ease-out; }

    @media print {
      body * { visibility: hidden; }
      #print-z-report, #print-z-report * { visibility: visible; }
      #print-z-report { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 20px; font-family: monospace; font-size: 14px; background: white; color: black; }
    }
  </style>
</head>
<body class="bg-slate-100 h-[100dvh] w-screen flex flex-col font-sans text-slate-800">

  <!-- 共用頂部標頭 -->
  <header class="bg-slate-900 w-full h-14 flex items-center justify-between px-4 shrink-0 shadow-md relative z-30">
    <div class="flex items-center text-white">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center mr-2 shadow-inner">
        <i class="fa-solid fa-cash-register text-sm"></i>
      </div>
      <span class="font-black tracking-widest text-lg">ClassPOS</span>
    </div>
    <div class="flex items-center space-x-3">
      <div id="role-badge" class="hidden"></div>
      
      <!-- 自助點餐模式解鎖按鈕 (預設隱藏) -->
      <button id="exit-customer-btn" onclick="exitCustomerMode()" class="hidden w-8 h-8 rounded-full bg-slate-800 text-slate-400 hover:text-white flex items-center justify-center transition active:scale-95">
        <i class="fa-solid fa-lock"></i>
      </button>
      
      <!-- 正常系統登出按鈕 -->
      <button id="power-btn" onclick="location.reload()" class="w-8 h-8 rounded-full bg-slate-800 text-slate-400 hover:text-rose-400 flex items-center justify-center transition active:scale-95">
        <i class="fa-solid fa-power-off"></i>
      </button>
    </div>
  </header>

  <!-- 登入視窗 -->
  <div id="login-modal" class="fixed inset-0 z-[80] bg-slate-900/95 backdrop-blur-md flex flex-col items-center justify-center transition-opacity duration-300">
    <div class="bg-white p-6 rounded-[2rem] shadow-2xl w-[90%] max-w-[360px] text-center flex flex-col items-center">
      <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-4 shadow-inner"><i class="fa-solid fa-fingerprint text-3xl"></i></div>
      <h2 class="text-2xl font-black mb-1 text-slate-800 tracking-widest">系統解鎖</h2>
      <p class="text-slate-400 mb-6 font-medium text-xs">請輸入PIN</p>
      
      <div class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl p-4 mb-6 flex justify-center items-center h-14 shadow-inner">
        <div id="login-pin-display" class="text-3xl font-black tracking-[0.5em] text-slate-800 flex space-x-2"></div>
      </div>
      <input type="hidden" id="login-pin-value">

      <div class="grid grid-cols-3 gap-3 w-full mb-6">
        <button onclick="loginNumpad(1)" class="bg-slate-100 hover:bg-slate-200 rounded-xl py-4 text-2xl font-bold active:scale-95 transition">1</button>
        <button onclick="loginNumpad(2)" class="bg-slate-100 hover:bg-slate-200 rounded-xl py-4 text-2xl font-bold active:scale-95 transition">2</button>
        <button onclick="loginNumpad(3)" class="bg-slate-100 hover:bg-slate-200 rounded-xl py-4 text-2xl font-bold active:scale-95 transition">3</button>
        <button onclick="loginNumpad(4)" class="bg-slate-100 hover:bg-slate-200 rounded-xl py-4 text-2xl font-bold active:scale-95 transition">4</button>
        <button onclick="loginNumpad(5)" class="bg-slate-100 hover:bg-slate-200 rounded-xl py-4 text-2xl font-bold active:scale-95 transition">5</button>
        <button onclick="loginNumpad(6)" class="bg-slate-100 hover:bg-slate-200 rounded-xl py-4 text-2xl font-bold active:scale-95 transition">6</button>
        <button onclick="loginNumpad(7)" class="bg-slate-100 hover:bg-slate-200 rounded-xl py-4 text-2xl font-bold active:scale-95 transition">7</button>
        <button onclick="loginNumpad(8)" class="bg-slate-100 hover:bg-slate-200 rounded-xl py-4 text-2xl font-bold active:scale-95 transition">8</button>
        <button onclick="loginNumpad(9)" class="bg-slate-100 hover:bg-slate-200 rounded-xl py-4 text-2xl font-bold active:scale-95 transition">9</button>
        <button onclick="loginClear()" class="bg-rose-50 text-rose-500 hover:bg-rose-100 rounded-xl py-4 text-xl font-bold active:scale-95 transition">清除</button>
        <button onclick="loginNumpad(0)" class="bg-slate-100 hover:bg-slate-200 rounded-xl py-4 text-2xl font-bold active:scale-95 transition">0</button>
        <button onclick="loginBackspace()" class="bg-slate-200 text-slate-600 rounded-xl py-4 text-xl font-bold active:scale-95 transition"><i class="fa-solid fa-delete-left"></i></button>
      </div>
      <button onclick="performLogin()" id="login-btn" class="w-full bg-blue-600 text-white font-black text-xl py-4 rounded-xl shadow-lg active:scale-95 transition mb-3">解鎖系統</button>
      
      <!-- 顧客自助點餐入口 -->
      <button onclick="enterCustomerMode()" class="text-slate-400 font-bold text-sm active:text-blue-600 transition p-2">切換至顧客自助點餐模式</button>
    </div>
  </div>

  <!-- 折扣視窗 -->
  <div id="discount-modal" class="fixed inset-0 z-[70] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center hidden">
    <div class="bg-white p-6 rounded-[2rem] shadow-2xl w-[90%] max-w-[360px] text-center">
      <h2 class="text-xl font-black mb-4 text-slate-800">自訂金額折讓</h2>
      <div class="bg-slate-50 border-2 border-slate-200 rounded-xl p-3 mb-4 text-3xl font-black text-rose-500">- $<span id="discount-input-display">0</span></div>
      <input type="hidden" id="discount-input-value" value="0">
      <div class="grid grid-cols-3 gap-2 w-full mb-6">
        <button onclick="discNumpad(1)" class="bg-slate-100 py-3 rounded-xl text-xl font-bold active:scale-95 transition">1</button>
        <button onclick="discNumpad(2)" class="bg-slate-100 py-3 rounded-xl text-xl font-bold active:scale-95 transition">2</button>
        <button onclick="discNumpad(3)" class="bg-slate-100 py-3 rounded-xl text-xl font-bold active:scale-95 transition">3</button>
        <button onclick="discNumpad(4)" class="bg-slate-100 py-3 rounded-xl text-xl font-bold active:scale-95 transition">4</button>
        <button onclick="discNumpad(5)" class="bg-slate-100 py-3 rounded-xl text-xl font-bold active:scale-95 transition">5</button>
        <button onclick="discNumpad(6)" class="bg-slate-100 py-3 rounded-xl text-xl font-bold active:scale-95 transition">6</button>
        <button onclick="discNumpad(7)" class="bg-slate-100 py-3 rounded-xl text-xl font-bold active:scale-95 transition">7</button>
        <button onclick="discNumpad(8)" class="bg-slate-100 py-3 rounded-xl text-xl font-bold active:scale-95 transition">8</button>
        <button onclick="discNumpad(9)" class="bg-slate-100 py-3 rounded-xl text-xl font-bold active:scale-95 transition">9</button>
        <button onclick="discClear()" class="bg-slate-200 rounded-xl py-3 text-lg font-bold active:scale-95 transition">C</button>
        <button onclick="discNumpad(0)" class="bg-slate-100 py-3 rounded-xl text-xl font-bold active:scale-95 transition">0</button>
        <button onclick="discBackspace()" class="bg-slate-200 py-3 rounded-xl text-lg font-bold active:scale-95 transition"><i class="fa-solid fa-delete-left"></i></button>
      </div>
      <div class="flex space-x-3">
        <button onclick="closeDiscountModal()" class="flex-1 bg-slate-200 font-bold py-3 rounded-xl active:scale-95 transition">取消</button>
        <button onclick="applyDiscount()" class="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition">確認折讓</button>
      </div>
    </div>
  </div>

  <!-- 商品上架視窗 -->
  <div id="product-modal" class="fixed inset-0 z-[70] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center hidden">
    <div class="bg-white p-6 rounded-[2rem] shadow-2xl w-[90%] max-w-[400px] max-h-[90vh] flex flex-col">
      <h2 class="text-xl font-black mb-4 text-slate-800 border-b pb-2">商品 / 套餐上架</h2>
      <div class="space-y-4 mb-6 flex-1 overflow-y-auto pr-2 no-scrollbar min-h-0">
        <div><label class="text-xs font-bold text-slate-500">品項類型</label>
          <select id="new-prod-type" onchange="toggleComboSelection()" class="w-full border border-slate-200 rounded-lg p-3 text-sm font-bold bg-slate-50 mt-1 outline-none focus:border-orange-500">
            <option value="single">單品商品</option>
            <option value="combo">套餐組合 (組合多個單品)</option>
          </select>
        </div>
        <div><label class="text-xs font-bold text-slate-500">名稱</label><input type="text" id="new-prod-name" class="w-full border border-slate-200 rounded-lg p-3 text-sm font-bold mt-1 outline-none focus:border-orange-500" placeholder="例：超值雙拼雙人套餐"></div>
        <div class="flex space-x-4">
          <div class="flex-1"><label class="text-xs font-bold text-slate-500">定價</label><input type="number" id="new-prod-price" class="w-full border border-slate-200 rounded-lg p-3 text-sm font-bold mt-1 outline-none focus:border-orange-500" placeholder="$"></div>
          <div class="flex-1"><label class="text-xs font-bold text-slate-500">初始庫存</label><input type="number" id="new-prod-stock" class="w-full border border-slate-200 rounded-lg p-3 text-sm font-bold mt-1 outline-none focus:border-orange-500" placeholder="數量"></div>
        </div>
        <div id="combo-items-section" class="hidden border border-slate-200 p-3 rounded-xl bg-slate-50">
          <label class="text-xs font-bold text-slate-700 block mb-2"><i class="fa-solid fa-list-check mr-1 text-orange-500"></i>勾選套餐內含單品：</label>
          <div id="combo-checkboxes-grid" class="grid grid-cols-1 gap-2 max-h-40 overflow-y-auto no-scrollbar"></div>
        </div>
      </div>
      <div class="flex space-x-3 shrink-0">
        <button onclick="closeProductModal()" class="flex-1 bg-slate-200 font-bold py-3 rounded-xl text-sm active:scale-95 transition">取消</button>
        <button onclick="saveNewProduct()" class="flex-1 bg-orange-500 text-white font-bold py-3 rounded-xl shadow-lg text-sm active:scale-95 transition">確認上架</button>
      </div>
    </div>
  </div>

  <main class="flex-1 bg-slate-100 flex relative overflow-hidden w-full">
    
    <!-- 點餐面板 -->
    <div id="view-pos" class="w-full h-full flex flex-col absolute inset-0 transition-opacity duration-300 bg-slate-50">
      <div class="bg-white px-4 py-3 border-b border-slate-200 shadow-sm z-10 shrink-0">
        <div class="relative w-full">
          <i class="fa-solid fa-magnifying-glass absolute left-4 top-2.5 text-slate-400"></i>
          <input type="text" id="search-input" onkeyup="filterProducts()" placeholder="搜尋單品、套餐關鍵字..." class="w-full bg-slate-100 border border-slate-200 rounded-full py-2 pl-12 pr-4 font-bold outline-none text-sm focus:border-blue-500 transition">
        </div>
      </div>
      <div class="p-4 overflow-y-auto no-scrollbar flex-1 pb-24 relative min-h-0">
        <div id="product-grid" class="grid grid-cols-2 gap-3"></div>
      </div>
      <!-- 購物車浮動按鈕 -->
      <div class="absolute bottom-6 right-6 z-20">
        <button id="cart-btn-floating" onclick="toggleCart()" class="w-14 h-14 bg-blue-600 rounded-full text-white shadow-xl flex items-center justify-center relative active:scale-95 transition">
          <i class="fa-solid fa-cart-shopping text-xl"></i>
          <span id="cart-badge" class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-slate-50 transition-transform">0</span>
        </button>
      </div>
    </div>

    <!-- 歷史單據 -->
    <div id="view-history" class="w-full h-full flex flex-col absolute inset-0 opacity-0 pointer-events-none transition-opacity duration-300 bg-white">
      <div class="p-4 border-b border-slate-200 shrink-0 flex justify-between items-center bg-slate-50">
        <h2 class="text-xl font-black text-slate-800 tracking-wider">今日銷售明細</h2>
        <button onclick="fetchHistory()" class="bg-blue-100 text-blue-600 px-3 py-1.5 text-sm rounded-lg font-bold active:scale-95 transition"><i class="fa-solid fa-rotate-right"></i></button>
      </div>
      <div class="flex-1 p-4 overflow-y-auto no-scrollbar pb-12 min-h-0">
        <div id="history-list" class="w-full space-y-3"></div>
      </div>
    </div>

    <!-- 進銷存 -->
    <div id="view-inventory" class="w-full h-full flex flex-col absolute inset-0 opacity-0 pointer-events-none transition-opacity duration-300 bg-white">
      <div class="p-4 border-b border-slate-200 shrink-0 bg-slate-50 flex justify-between items-center">
        <h2 class="text-xl font-black text-orange-600 tracking-wider"><i class="fa-solid fa-boxes-stacked mr-2"></i>進銷存</h2>
        <button onclick="openProductModal()" class="bg-orange-500 text-white px-3 py-1.5 rounded-lg font-bold shadow-md text-sm active:scale-95 transition"><i class="fa-solid fa-plus"></i> 新增</button>
      </div>
      <div class="flex-1 p-4 overflow-y-auto no-scrollbar pb-12 min-h-0">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden w-full">
          <div class="overflow-x-auto w-full no-scrollbar">
            <table class="w-full min-w-[500px] text-left whitespace-nowrap text-sm">
              <thead class="bg-slate-100 border-b border-slate-200">
                <tr><th class="p-3 font-bold text-slate-600">類型</th><th class="p-3 font-bold text-slate-600">名稱</th><th class="p-3 font-bold text-slate-600 text-center">售價</th><th class="p-3 font-bold text-slate-600 text-center">庫存</th><th class="p-3 font-bold text-slate-600 text-right">操作</th></tr>
              </thead>
              <tbody id="inventory-list" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- 員工管理 -->
    <div id="view-employees" class="w-full h-full flex flex-col absolute inset-0 opacity-0 pointer-events-none transition-opacity duration-300 bg-white">
      <div class="p-4 border-b border-slate-200 shrink-0 bg-slate-50">
        <h2 class="text-xl font-black text-purple-600 tracking-wider"><i class="fa-solid fa-users mr-2"></i>小組與員工管理</h2>
      </div>
      <div class="flex-1 p-4 flex flex-col gap-4 overflow-y-auto no-scrollbar pb-16 min-h-0">
        <div class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl shrink-0">
          <h3 class="font-bold text-sm mb-3 text-slate-700">註冊新帳號 / 排班</h3>
          <div class="space-y-3 mb-4">
            <div><input type="text" id="emp-username" placeholder="登入代號 (例: user_a)" class="w-full border border-slate-200 p-2.5 text-sm rounded-xl font-bold outline-none focus:border-purple-500"></div>
            <div><input type="text" id="emp-name" placeholder="顯示名稱 (例: 收銀員A)" class="w-full border border-slate-200 p-2.5 text-sm rounded-xl font-bold outline-none focus:border-purple-500"></div>
            <div><input type="text" id="emp-group" placeholder="所屬小組/班別 (例: 上午班 / 第一組)" class="w-full border border-slate-200 p-2.5 text-sm rounded-xl font-bold outline-none focus:border-purple-500"></div>
            <div class="flex gap-2">
              <input type="text" maxlength="4" id="emp-pin" placeholder="4位數字PIN" class="flex-1 border border-slate-200 p-2.5 text-sm rounded-xl font-mono font-bold text-center outline-none focus:border-purple-500">
              <select id="emp-role" class="flex-1 border border-slate-200 p-2.5 text-sm rounded-xl font-bold bg-white outline-none focus:border-purple-500">
                <option value="cashier">收銀</option>
                <option value="admin">店長</option>
              </select>
            </div>
          </div>
          <button onclick="saveEmployee()" class="w-full bg-purple-600 text-white font-bold py-3 text-sm rounded-xl shadow-md active:scale-95 transition">建立帳號</button>
        </div>
        <div class="w-full bg-white border border-slate-200 rounded-2xl overflow-hidden shrink-0">
          <div class="overflow-x-auto w-full no-scrollbar">
            <table class="w-full min-w-[500px] text-left whitespace-nowrap text-sm">
              <thead class="bg-slate-50 border-b border-slate-200">
                <tr><th class="p-3 font-bold text-slate-600">帳號</th><th class="p-3 font-bold text-slate-600">名稱</th><th class="p-3 font-bold text-slate-600">小組班別</th><th class="p-3 font-bold text-slate-600">PIN</th><th class="p-3 font-bold text-slate-600">權限</th><th class="p-3 font-bold text-slate-600 text-right">刪除</th></tr>
              </thead>
              <tbody id="employee-list" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- 報表 -->
    <div id="view-reports" class="w-full h-full flex flex-col absolute inset-0 opacity-0 pointer-events-none transition-opacity duration-300 bg-slate-50">
      <div class="p-4 border-b border-slate-200 shrink-0 flex flex-col bg-white gap-3 shadow-sm z-10">
        <div>
          <h2 class="text-xl font-black text-emerald-600 tracking-wider"><i class="fa-solid fa-chart-pie mr-2"></i>營業報表與匯出</h2>
        </div>
        <div class="flex flex-col gap-2">
          <div class="flex items-center space-x-2 bg-slate-100 p-2 rounded-xl border w-full overflow-hidden">
             <span class="text-xs font-bold text-slate-500 shrink-0">小組</span>
             <select id="report-group-filter" onchange="generateReports()" class="bg-transparent font-bold text-xs outline-none w-full border-none">
                <option value="all">不限小組 (整天全部)</option>
             </select>
          </div>
          <div class="flex items-center space-x-2 bg-slate-100 p-2 rounded-xl border w-full overflow-hidden">
            <span class="text-xs font-bold text-slate-500 shrink-0">時段</span>
            <input type="datetime-local" id="report-start" onchange="generateReports()" class="bg-transparent font-bold text-xs outline-none w-full">
            <span class="text-slate-400 text-xs shrink-0">至</span>
            <input type="datetime-local" id="report-end" onchange="generateReports()" class="bg-transparent font-bold text-xs outline-none w-full">
          </div>
          <div class="flex space-x-2 w-full">
            <button onclick="clearReportFilter()" class="flex-1 bg-slate-200 text-slate-700 py-2 rounded-xl font-bold text-xs active:scale-95 transition">重設</button>
            <button onclick="printZReport()" class="flex-1 bg-slate-900 text-white py-2 rounded-xl font-bold text-xs active:scale-95 transition"><i class="fa-solid fa-print mr-1"></i>列印</button>
            <button onclick="exportCSV()" class="flex-[2] bg-emerald-600 text-white py-2 rounded-xl font-bold text-xs active:scale-95 transition shadow-sm"><i class="fa-solid fa-file-excel mr-1"></i>匯出 Excel</button>
          </div>
        </div>
      </div>
      <div class="flex-1 p-4 overflow-y-auto no-scrollbar pb-12 min-h-0">
        <div class="grid grid-cols-1 gap-3 mb-4">
          <div class="bg-white p-4 rounded-2xl border shadow-sm flex items-center justify-between">
            <div><p class="text-slate-500 text-xs font-bold mb-1">該區間/小組淨利</p><p class="text-3xl font-black text-blue-600">$<span id="report-revenue">0</span></p></div>
            <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-blue-500 text-xl"><i class="fa-solid fa-sack-dollar"></i></div>
          </div>
          <div class="bg-white p-4 rounded-2xl border shadow-sm flex items-center justify-between">
            <div><p class="text-slate-500 text-xs font-bold mb-1">有效單數</p><p class="text-3xl font-black text-emerald-600"><span id="report-orders">0</span></p></div>
            <div class="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-500 text-xl"><i class="fa-solid fa-receipt"></i></div>
          </div>
        </div>
        <div class="bg-white rounded-2xl border p-4 shadow-sm w-full">
          <h3 class="font-bold text-slate-700 text-sm mb-3 border-b pb-2"><i class="fa-solid fa-list mr-2"></i>銷售流水帳</h3>
          <div id="report-table-rows" class="space-y-2"></div>
        </div>
      </div>
    </div>

    <!-- 設定 -->
    <div id="view-settings" class="w-full h-full flex flex-col absolute inset-0 opacity-0 pointer-events-none transition-opacity duration-300 bg-slate-50">
      <div class="p-4 border-b border-slate-200 shrink-0 bg-white"><h2 class="text-xl font-black text-slate-800 tracking-wider"><i class="fa-solid fa-gear mr-2"></i>系統設定</h2></div>
      <div class="flex-1 p-4 overflow-y-auto no-scrollbar min-h-0">
        <div class="w-full bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
          <h3 class="text-lg font-bold text-rose-600 mb-2 border-b pb-2"><i class="fa-solid fa-triangle-exclamation mr-2"></i>系統重置</h3>
          <p class="text-slate-500 mb-4 text-xs leading-relaxed">此動作將刪除雲端上所有的【歷史訂單紀錄】、【叫號暫存】、【單號計數器】，將系統還原。<strong>（商品菜單與員工帳號將予以保留）</strong></p>
          <button onclick="factoryResetSystem()" id="btn-factory-reset" class="w-full bg-rose-600 text-white font-black py-3 rounded-xl shadow-md active:scale-95 transition text-sm">
            <i class="fa-solid fa-dumpster-fire mr-2"></i> 清空資料・全部歸零
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- 購物車結帳抽屜 (由下往上滑動) -->
  <aside id="checkout-sidebar" class="fixed inset-0 z-[50] bg-slate-50 flex flex-col transition-transform duration-300 translate-y-full pb-safe">
    
    <div id="checkout-success-overlay" class="absolute inset-0 bg-emerald-600 z-[60] flex flex-col items-center justify-center hidden">
      <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 shadow-xl"><i class="fa-solid fa-check text-4xl text-emerald-500"></i></div>
      <h2 id="success-title" class="text-2xl font-black text-white mb-2">結帳成功</h2>
      <p id="success-subtitle" class="text-emerald-100 font-bold mb-6 text-sm">請將號碼牌交給顧客</p>
      <div class="bg-white p-5 rounded-3xl text-center w-56 shadow-2xl mb-8">
        <p class="text-slate-400 font-bold mb-1 text-xs">取餐單號</p>
        <div class="text-6xl font-black text-slate-800 tracking-tighter">#<span id="success-order-no">000</span></div>
      </div>
      <button onclick="nextOrder()" class="bg-slate-900 text-white font-black text-lg py-4 w-[80%] rounded-xl shadow-xl active:scale-95 transition">下一單 (Next)</button>
    </div>

    <!-- 頂部標題區 -->
    <div class="bg-slate-900 text-white flex justify-between items-center p-3 shrink-0 shadow-md">
      <span class="font-black text-base tracking-widest"><i class="fa-solid fa-cart-shopping mr-2"></i>購物明細</span>
      <button onclick="toggleCart()" class="text-slate-300 hover:text-white px-2 active:scale-95 transition"><i class="fa-solid fa-chevron-down text-xl"></i></button>
    </div>

    <div class="flex-1 flex flex-col min-h-0 bg-white m-2 mb-0 rounded-t-xl shadow-sm border border-b-0 border-slate-200 relative overflow-hidden">
      <div class="absolute -top-3 left-0 right-0 h-4 receipt-edge"></div>
      <div class="px-3 py-2 border-b border-dashed border-slate-300 flex justify-end items-center bg-white z-10 pt-3 space-x-2 shrink-0">
        <button id="discount-btn" onclick="openDiscountModal()" class="text-slate-500 border border-slate-300 font-bold px-2 py-0.5 rounded text-xs active:scale-95 transition"><i class="fa-solid fa-tag mr-1"></i>折扣</button>
        <button id="clear-cart-btn" onclick="clearCart()" class="text-rose-500 font-bold bg-rose-50 px-2 py-0.5 rounded text-xs active:scale-95 transition">清空</button>
      </div>
      
      <!-- 購物車清單列表 -->
      <div id="cart-ui" class="flex-1 overflow-y-auto no-scrollbar p-3 space-y-2 bg-white z-10 min-h-0"></div>
      
      <!-- 金額總計區 -->
      <div class="p-3 bg-white border-t border-dashed border-slate-300 z-10 space-y-1 shrink-0 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
        <div id="discount-row" class="flex justify-between items-end hidden text-rose-500">
          <span class="font-bold text-xs">折讓扣除</span><span class="text-base font-bold">- $<span id="display-discount-amount">0</span></span>
        </div>
        <div class="flex justify-between items-end">
          <span class="text-slate-500 font-bold text-xs">應付總額</span><span class="text-2xl font-black text-blue-600 tracking-tighter">NT$ <span id="total-ui">0</span></span>
        </div>
      </div>
    </div>

    <!-- 數字鍵盤與結帳區 -->
    <div class="bg-slate-800 text-white p-2 shrink-0">
      
      <!-- 收銀專屬數字鍵盤 (自助模式時隱藏) -->
      <div id="cash-numpad-area">
        <div class="bg-slate-900 rounded-lg flex justify-between items-center p-1.5 px-3 mb-2 border border-slate-700">
          <span class="font-bold text-slate-400 text-xs">實收 <span id="display-received" class="text-white ml-1 text-base">$0</span></span>
          <div class="text-right flex items-center space-x-2">
             <span class="text-[10px] text-slate-500">找零</span>
             <span class="text-lg font-black text-emerald-400" id="change-amount">$0</span>
          </div>
        </div>
        <input type="hidden" id="received-amount">
        <div class="grid grid-cols-4 gap-1 mb-2">
          <button onclick="numpadInput(1)" class="bg-slate-700 rounded-md py-2 text-base font-bold active:scale-95 transition">1</button>
          <button onclick="numpadInput(2)" class="bg-slate-700 rounded-md py-2 text-base font-bold active:scale-95 transition">2</button>
          <button onclick="numpadInput(3)" class="bg-slate-700 rounded-md py-2 text-base font-bold active:scale-95 transition">3</button>
          <button onclick="setReceived(100)" class="bg-blue-600/30 text-blue-400 rounded-md py-2 text-xs font-bold active:scale-95 transition">$100</button>
          <button onclick="numpadInput(4)" class="bg-slate-700 rounded-md py-2 text-base font-bold active:scale-95 transition">4</button>
          <button onclick="numpadInput(5)" class="bg-slate-700 rounded-md py-2 text-base font-bold active:scale-95 transition">5</button>
          <button onclick="numpadInput(6)" class="bg-slate-700 rounded-md py-2 text-base font-bold active:scale-95 transition">6</button>
          <button onclick="setReceived(500)" class="bg-blue-600/30 text-blue-400 rounded-md py-2 text-xs font-bold active:scale-95 transition">$500</button>
          <button onclick="numpadInput(7)" class="bg-slate-700 rounded-md py-2 text-base font-bold active:scale-95 transition">7</button>
          <button onclick="numpadInput(8)" class="bg-slate-700 rounded-md py-2 text-base font-bold active:scale-95 transition">8</button>
          <button onclick="numpadInput(9)" class="bg-slate-700 rounded-md py-2 text-base font-bold active:scale-95 transition">9</button>
          <button onclick="setReceived(1000)" class="bg-blue-600/30 text-blue-400 rounded-md py-2 text-xs font-bold active:scale-95 transition">$1k</button>
          <button onclick="numpadClear()" class="bg-rose-500/20 text-rose-400 rounded-md py-2 text-base font-bold active:scale-95 transition">C</button>
          <button onclick="numpadInput(0)" class="bg-slate-700 rounded-md py-2 text-base font-bold active:scale-95 transition">0</button>
          <button onclick="numpadBackspace()" class="bg-slate-600 rounded-md py-2 text-base font-bold active:scale-95 transition"><i class="fa-solid fa-delete-left"></i></button>
          <button id="btn-exact" onclick="setExactAmount()" class="bg-emerald-500/20 text-emerald-400 rounded-md py-2 text-xs font-bold active:scale-95 transition">剛好</button>
        </div>
      </div>

      <button onclick="checkout()" id="checkout-btn" class="w-full bg-emerald-500 text-white py-2.5 rounded-lg text-lg font-black shadow-[0_0_15px_rgba(16,185,129,0.3)] active:scale-95 transition">收款結帳</button>
    </div>
  </aside>

  <!-- 底部導覽列 -->
  <nav id="bottom-nav" class="w-full bg-white border-t border-slate-200 flex flex-row overflow-x-auto no-scrollbar shadow-[0_-4px_10px_rgba(0,0,0,0.03)] z-20 shrink-0 h-[64px] pb-safe">
    <button onclick="switchTab('pos')" id="nav-pos" class="nav-btn flex-1 min-w-[64px] h-full flex flex-col items-center justify-center text-blue-600 transition active:bg-slate-50">
      <i class="fa-solid fa-border-all text-xl mb-1"></i><span class="text-[10px] font-bold">點餐</span>
    </button>
    <button onclick="switchTab('history')" id="nav-history" class="nav-btn flex-1 min-w-[64px] h-full flex flex-col items-center justify-center text-slate-400 transition active:bg-slate-50">
      <i class="fa-solid fa-receipt text-xl mb-1"></i><span class="text-[10px] font-bold">單據</span>
    </button>
    
    <div id="admin-menu" class="hidden flex-row h-full">
      <button onclick="switchTab('inventory')" id="nav-inventory" class="nav-btn flex-1 min-w-[64px] h-full flex flex-col items-center justify-center text-slate-400 transition active:bg-slate-50">
        <i class="fa-solid fa-boxes-stacked text-xl mb-1"></i><span class="text-[10px] font-bold">庫存</span>
      </button>
      <button onclick="switchTab('employees')" id="nav-employees" class="nav-btn flex-1 min-w-[64px] h-full flex flex-col items-center justify-center text-slate-400 transition active:bg-slate-50">
        <i class="fa-solid fa-users text-xl mb-1"></i><span class="text-[10px] font-bold">小組</span>
      </button>
      <button onclick="switchTab('reports')" id="nav-reports" class="nav-btn flex-1 min-w-[64px] h-full flex flex-col items-center justify-center text-slate-400 transition active:bg-slate-50">
        <i class="fa-solid fa-chart-pie text-xl mb-1"></i><span class="text-[10px] font-bold">報表</span>
      </button>
      <button onclick="switchTab('settings')" id="nav-settings" class="nav-btn flex-1 min-w-[64px] h-full flex flex-col items-center justify-center text-slate-400 transition active:bg-slate-50">
        <i class="fa-solid fa-gear text-xl mb-1"></i><span class="text-[10px] font-bold">設定</span>
      </button>
    </div>
  </nav>

  <script type="module">
    import { db, doc, setDoc, onSnapshot, collection, serverTimestamp } from './firebase-config.js';
    import { writeBatch, increment, getDoc, getDocs, runTransaction, query, orderBy, limit, updateDoc, where, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    let currentUser = null; let products = []; let cart = []; let allOrders = []; let employees = [];
    let subtotal = 0; let total = 0; let customDiscountAmount = 0;
    let isCustomerMode = false;
    
    // 儲存正在處理的「待付款」自助訂單 ID 與單號
    let pendingOrderId = null; 
    let pendingOrderNo = null;

    // --- 顧客自助點餐模式切換邏輯 ---
    window.enterCustomerMode = function() {
      isCustomerMode = true;
      currentUser = { name: "自助機台", role: "customer", group: "自助機" };
      document.getElementById('login-modal').classList.add('opacity-0', 'pointer-events-none');
      
      document.getElementById('bottom-nav').classList.add('hidden');
      document.getElementById('power-btn').classList.add('hidden');
      document.getElementById('role-badge').classList.add('hidden');
      document.getElementById('discount-btn').classList.add('hidden'); 
      document.getElementById('exit-customer-btn').classList.remove('hidden');
      
      document.getElementById('cash-numpad-area').classList.add('hidden');
      const checkoutBtn = document.getElementById('checkout-btn');
      checkoutBtn.innerText = "送出訂單 (前往櫃檯結帳)";
      checkoutBtn.classList.replace('py-2.5', 'py-4');
      checkoutBtn.classList.replace('text-lg', 'text-xl');
      
      initPOS();
    };

    window.exitCustomerMode = async function() {
      const pin = prompt("【店長/收銀權限】請輸入解鎖 PIN 碼以退出自助模式：");
      if (!pin) return;
      try {
        const match = await getDocs(query(collection(db, "accounts"), where("pin", "==", pin)));
        if (!match.empty) {
          location.reload(); 
        } else {
          alert("PIN碼錯誤！無法退出。");
        }
      } catch (e) { alert("驗證連線失敗"); }
    };

    // --- 介面切換 ---
    window.switchTab = function(tab) {
      if (isCustomerMode) return; 
      
      document.querySelectorAll('.nav-btn').forEach(btn => { 
        btn.classList.remove('text-blue-600', 'text-orange-600', 'text-emerald-600', 'text-purple-600', 'text-slate-800'); 
        btn.classList.add('text-slate-400'); 
      });
      const activeBtn = document.getElementById(`nav-${tab}`);
      const cMap = { inventory: 'text-orange-600', reports: 'text-emerald-600', employees: 'text-purple-600', settings: 'text-slate-800', pos: 'text-blue-600', history: 'text-blue-600' };
      activeBtn.classList.remove('text-slate-400'); 
      activeBtn.classList.add(cMap[tab] || 'text-blue-600');
      
      ['pos', 'history', 'inventory', 'employees', 'reports', 'settings'].forEach(t => {
        const v = document.getElementById(`view-${t}`); if(v) v.classList.toggle('opacity-0', t !== tab); if(v) v.classList.toggle('pointer-events-none', t !== tab);
      });
      document.getElementById('checkout-sidebar').classList.add('translate-y-full'); 
      if(tab === 'history') fetchHistory(); if(tab === 'reports') generateReports(); if(tab === 'employees') fetchEmployees();
    };

    window.toggleCart = () => {
      document.getElementById('checkout-sidebar').classList.toggle('translate-y-full');
    };

    // --- 觸控密碼盤登入 ---
    const pinField = document.getElementById('login-pin-value');
    window.loginNumpad = n => { if(pinField.value.length < 4) { pinField.value += n; updPin(); } };
    window.loginBackspace = () => { pinField.value = pinField.value.slice(0, -1); updPin(); };
    window.loginClear = () => { pinField.value = ''; updPin(); };
    const updPin = () => document.getElementById('login-pin-display').innerHTML = Array(pinField.value.length).fill('<i class="fa-solid fa-circle text-2xl mx-1 text-slate-800"></i>').join('') || '<span class="text-slate-300 text-lg">請輸入密碼</span>';

    window.performLogin = async function() {
      const pin = pinField.value; if(!pin) return;
      document.getElementById('login-btn').innerText = "驗證權限中...";
      try {
        const accRef = collection(db, "accounts");
        const adminDoc = await getDoc(doc(accRef, "admin")); if (!adminDoc.exists()) await setDoc(doc(accRef, "admin"), { pin: "0000", name: "總店長", role: "admin", group: "管理組" });
        
        const match = await getDocs(query(accRef, where("pin", "==", pin)));
        if (!match.empty) {
          currentUser = { id: match.docs[0].id, ...match.docs[0].data() };
          document.getElementById('admin-menu').classList.toggle('hidden', currentUser.role !== 'admin');
          const badge = document.getElementById('role-badge');
          badge.classList.remove('hidden');
          badge.innerText = currentUser.role === 'admin' ? `店長 - ${currentUser.group || '無'}` : `收銀 - ${currentUser.group || '無'}`;
          badge.className = currentUser.role === 'admin' ? 'inline-block text-[10px] font-black px-2 py-1 rounded border border-orange-500 text-orange-400 bg-orange-500/10' : 'inline-block text-[10px] font-black px-2 py-1 rounded border border-blue-500 text-blue-400 bg-blue-50/10';
          document.getElementById('login-modal').classList.add('opacity-0', 'pointer-events-none');
          initPOS();
        } else { alert("PIN 碼錯誤！"); loginClear(); document.getElementById('login-btn').innerText = "解鎖系統"; }
      } catch (e) { alert("連線失敗"); document.getElementById('login-btn').innerText = "解鎖系統"; }
    };

    // --- 資料同步中心 ---
    function initPOS() {
      onSnapshot(collection(db, "products"), (snap) => {
        products = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        filterProducts();
        if(currentUser && currentUser.role === 'admin') { renderInventory(); updateComboOptions(); }
      });
      onSnapshot(collection(db, "orders"), (snap) => { 
        allOrders = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); 
        if(!isCustomerMode) {
            updateGroupFilterOptions(); 
            generateReports(); 
        }
      });
    }

    function updateGroupFilterOptions() {
      const groupSelect = document.getElementById('report-group-filter');
      if(!groupSelect) return;
      const currentVal = groupSelect.value;
      const groups = new Set();
      allOrders.forEach(o => { if (o.operatorGroup) groups.add(o.operatorGroup); });
      
      let html = '<option value="all">不限小組 (整天全部)</option>';
      groups.forEach(g => { html += `<option value="${g}">${g}</option>`; });
      groupSelect.innerHTML = html;
      
      if (groups.has(currentVal)) { groupSelect.value = currentVal; }
    }

    window.filterProducts = function() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const filtered = products.filter(p => p.name.toLowerCase().includes(q));
      document.getElementById('product-grid').innerHTML = filtered.map(p => {
        const isSoldOut = p.stock <= 0;
        const subLabel = p.isCombo ? `<span class="bg-orange-500 text-white text-[10px] px-1.5 py-0.5 rounded font-bold mr-1">套餐</span><span class="text-[10px] text-slate-400 line-clamp-1">${p.components?.join('+') || ''}</span>` : '單品';
        return `<div onclick="${isSoldOut ? '' : `addToCart('${p.id}', event)`}" class="bg-white border border-slate-200 rounded-2xl p-3 flex flex-col justify-between aspect-square ${isSoldOut ? 'opacity-50 grayscale' : 'cursor-pointer active:scale-95 hover:shadow-xl transition'} shadow-sm relative overflow-hidden select-none">
            ${isSoldOut ? '<div class="absolute inset-0 bg-slate-900/10 z-10 flex items-center justify-center"><span class="bg-slate-800 text-white px-2 py-1 rounded-full text-xs font-bold transform -rotate-12">售完</span></div>' : ''}
            <div><h3 class="font-bold text-slate-700 text-sm leading-tight mb-1 line-clamp-2">${p.name}</h3><div class="mb-2 h-4 overflow-hidden flex items-center">${subLabel}</div><p class="text-blue-600 font-black text-xl">$${p.price}</p></div>
            <div class="text-right text-[10px] font-bold text-slate-400">${isSoldOut ? '已售完' : `庫存: ${p.stock}`}</div>
          </div>`;
      }).join('');
    };

    // --- 購物車與折扣折讓 ---
    window.addToCart = (id, e) => { 
      const p = products.find(p => p.id === id); 
      const ex = cart.find(i => i.id === id); 
      if ((ex ? ex.qty : 0) >= p.stock) return; 
      if (ex) ex.qty += 1; else cart.push({ ...p, qty: 1 }); 
      
      if (e) {
        const btn = document.getElementById('cart-btn-floating');
        if (btn) {
          const btnRect = btn.getBoundingClientRect();
          const startX = e.touches ? e.touches[0].clientX : e.clientX;
          const startY = e.touches ? e.touches[0].clientY : e.clientY;
          
          const fly = document.createElement('div');
          fly.className = 'fixed z-[100] w-6 h-6 bg-rose-500 rounded-full shadow-lg pointer-events-none transition-all duration-500 ease-in-out flex items-center justify-center text-white text-[12px] font-black';
          fly.innerText = '+1';
          fly.style.left = startX + 'px'; 
          fly.style.top = startY + 'px';
          document.body.appendChild(fly);
          
          requestAnimationFrame(() => {
            fly.style.left = (btnRect.left + btnRect.width / 2 - 12) + 'px';
            fly.style.top = (btnRect.top + btnRect.height / 2 - 12) + 'px';
            fly.style.transform = 'scale(0.3)';
            fly.style.opacity = '0.2';
          });
          
          setTimeout(() => { 
            fly.remove(); 
            const badge = document.getElementById('cart-badge');
            badge.classList.remove('badge-bump');
            void badge.offsetWidth; 
            badge.classList.add('badge-bump');
          }, 500);
        }
      }
      updateCartUI(); 
    };
    
    window.changeQty = (id, delta) => { const item = cart.find(i => i.id === id); if (delta > 0 && item.qty >= products.find(p => p.id === id).stock) return; item.qty += delta; if (item.qty <= 0) cart = cart.filter(i => i.id !== id); updateCartUI(); };
    window.removeCartItem = id => { cart = cart.filter(i => i.id !== id); updateCartUI(); };
    window.clearCart = () => { cart = []; customDiscountAmount = 0; document.getElementById('received-amount').value = ''; updateCartUI(); };

    const dF = document.getElementById('discount-input-value'); const dD = document.getElementById('discount-input-display');
    window.openDiscountModal = () => { if(cart.length===0)return; dF.value='0'; dD.innerText='0'; document.getElementById('discount-modal').classList.remove('hidden'); };
    window.closeDiscountModal = () => document.getElementById('discount-modal').classList.add('hidden');
    window.discNumpad = n => { dF.value = dF.value === '0' ? String(n) : dF.value + n; dD.innerText = dF.value; };
    window.discBackspace = () => { dF.value = dF.value.slice(0, -1) || '0'; dD.innerText = dF.value; };
    window.discClear = () => { dF.value = '0'; dD.innerText = '0'; };
    window.applyDiscount = () => { customDiscountAmount = parseInt(dF.value) || 0; closeDiscountModal(); updateCartUI(); };

    async function updateCartUI() {
      subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      if(customDiscountAmount > subtotal) customDiscountAmount = subtotal;
      total = subtotal - customDiscountAmount;
      
      const dRow = document.getElementById('discount-row');
      dRow.classList.toggle('hidden', customDiscountAmount <= 0);
      document.getElementById('display-discount-amount').innerText = customDiscountAmount;
      document.getElementById('total-ui').innerText = total; document.getElementById('btn-exact').innerText = total > 0 ? `剛好 $${total}` : '剛好';
      
      const badge = document.getElementById('cart-badge');
      if (badge) badge.innerText = cart.reduce((sum, item) => sum + item.qty, 0);
      
      const isPending = pendingOrderId !== null;

      // 當處理「待付款」訂單時，鎖定部分 UI 功能
      const discBtn = document.getElementById('discount-btn');
      if(discBtn) discBtn.classList.toggle('hidden', isPending || isCustomerMode); 
      
      const clearBtn = document.getElementById('clear-cart-btn');
      if(clearBtn) {
          if (isPending) {
              clearBtn.innerText = '取消結帳';
              clearBtn.onclick = () => { pendingOrderId=null; pendingOrderNo=null; clearCart(); document.getElementById('checkout-sidebar').classList.add('translate-y-full'); };
              clearBtn.className = "text-slate-500 font-bold bg-slate-100 px-2 py-0.5 rounded text-xs active:scale-95 transition";
          } else {
              clearBtn.innerText = '清空';
              clearBtn.onclick = clearCart;
              clearBtn.className = "text-rose-500 font-bold bg-rose-50 px-2 py-0.5 rounded text-xs active:scale-95 transition";
          }
      }
      
      document.getElementById('cart-ui').innerHTML = cart.length === 0 ? `<div class="h-full flex flex-col items-center justify-center text-slate-300"><i class="fa-solid fa-receipt text-3xl mb-2 opacity-50"></i><p class="font-bold tracking-widest text-xs">尚未點餐</p></div>` 
        : cart.map(item => `
          <div class="flex flex-col border-b border-slate-100 pb-2 mb-2 relative">
            ${!isPending ? `<button onclick="removeCartItem('${item.id}')" class="absolute right-0 top-0 text-slate-300 hover:text-rose-500 transition py-0.5 px-2"><i class="fa-solid fa-trash-can"></i></button>` : ''}
            <div class="flex justify-between font-bold text-slate-700 text-sm mb-0.5 ${!isPending?'pr-8':''}">
              <span>${item.name}</span><span>$${item.price * item.qty}</span>
            </div>
            <div class="text-[10px] text-slate-400 mb-1.5">${item.isCombo ? `組合：${item.components?.join(', ')}` : '單品'}</div>
            ${isPending 
              ? `<div class="text-xs font-bold text-slate-600 bg-slate-100 self-start px-2 py-1 rounded">數量: ${item.qty}</div>`
              : `<div class="flex items-center space-x-3 bg-slate-50 self-start rounded-lg p-1 border"><button onclick="changeQty('${item.id}', -1)" class="w-7 h-7 bg-white rounded font-bold text-slate-600 active:bg-slate-200 transition">-</button><span class="w-4 text-center font-bold text-slate-800 text-xs">${item.qty}</span><button onclick="changeQty('${item.id}', 1)" class="w-7 h-7 bg-slate-200 rounded font-bold text-slate-700 active:bg-slate-300 transition">+</button></div>`
            }
          </div>`).join('');
          
      calculateChange();
      try { await setDoc(doc(db, "active_sessions", "station_1"), { cartItems: cart, totalAmount: total, status: "ordering" }); } catch(e){}
    }

    const iF = document.getElementById('received-amount'); const dR = document.getElementById('display-received');
    window.numpadInput = num => { iF.value = iF.value === '0' ? String(num) : iF.value + num; calculateChange(); };
    window.setReceived = amt => { iF.value = String(amt); calculateChange(); }; window.setExactAmount = () => { if(total>0) setReceived(total); };
    window.numpadBackspace = () => { iF.value = iF.value.slice(0, -1); calculateChange(); }; window.numpadClear = () => { iF.value = ''; calculateChange(); };
    function calculateChange() {
      const b = document.getElementById('checkout-btn');
      
      if (isCustomerMode) {
        b.disabled = cart.length === 0;
        return;
      }
      
      const r = parseInt(iF.value) || 0; dR.innerText = `$${r}`; const d = document.getElementById('change-amount');
      if (cart.length === 0) { d.innerText = '$0'; b.disabled = true; return; }
      if (iF.value === '') { d.innerText = '$0'; d.className = 'text-lg font-black text-slate-500'; b.disabled = false; }
      else if (r >= total) { d.innerText = '$' + (r - total); d.className = 'text-lg font-black text-emerald-400'; b.disabled = false; }
      else { d.innerText = '不足'; d.className = 'text-lg font-black text-rose-400'; b.disabled = true; }
    }

    window.checkout = async function() {
      if (cart.length === 0) return; 
      
      const r = isCustomerMode ? 0 : (parseInt(iF.value) || total); 
      const c = isCustomerMode ? 0 : (r - total);
      const currentStatus = isCustomerMode ? "unpaid" : "pending";

      document.getElementById('checkout-btn').disabled = true;
      try {
        if (pendingOrderId) {
            // 店員載入自助點餐，進行後續付款結帳 (不重複扣減商品庫存)
            const batch = writeBatch(db);
            batch.update(doc(db, "orders", pendingOrderId), {
                status: "pending",
                received: r,
                change: c,
                operatorId: currentUser.name,
                operatorGroup: currentUser.group || "未分組"
            });
            batch.set(doc(db, "active_sessions", "station_1"), { cartItems: [], totalAmount: 0, status: "completed", change: c, orderNumber: pendingOrderNo });
            await batch.commit();

            document.getElementById('success-title').innerText = "結帳收款成功";
            document.getElementById('success-subtitle').innerText = "請將單據與找零交給顧客";
            document.getElementById('success-order-no').innerText = pendingOrderNo;
            document.getElementById('checkout-success-overlay').classList.remove('hidden');
        } else {
            // 正常結帳 / 顧客自助送出訂單
            const orderNoNum = await runTransaction(db, async t => {
              const cd = await t.get(doc(db, "counters", "daily_order"));
              let nc = cd.exists() ? cd.data().count + 1 : 1;
              t.set(doc(db, "counters", "daily_order"), { count: nc }, { merge: true }); return nc;
            });
            const orderNo = String(orderNoNum).padStart(3, '0');
            const batch = writeBatch(db);
            
            batch.set(doc(collection(db, "orders")), { orderNumber: orderNo, items: cart, subtotal, discount: customDiscountAmount, total, received: r, change: c, operatorId: currentUser.name, operatorGroup: currentUser.group || "未分組", status: currentStatus, timestamp: serverTimestamp() });
            cart.forEach(item => batch.update(doc(db, "products", item.id), { stock: increment(-item.qty) }));
            batch.set(doc(db, "active_sessions", "station_1"), { cartItems: [], totalAmount: 0, status: "completed", change: c, orderNumber: orderNo });
            await batch.commit();
            
            if (isCustomerMode) {
              document.getElementById('success-title').innerText = "訂單已送出";
              document.getElementById('success-subtitle').innerText = "請憑單號至櫃檯付款取餐";
            } else {
              document.getElementById('success-title').innerText = "結帳成功";
              document.getElementById('success-subtitle').innerText = "請將號碼牌交給顧客";
            }

            document.getElementById('checkout-success-overlay').classList.remove('hidden');
            document.getElementById('success-order-no').innerText = orderNo;
        }
      } catch (e) { 
        alert("結帳發生錯誤！"); 
        document.getElementById('checkout-btn').disabled = false; 
      }
    };

    window.nextOrder = function() {
      cart = []; total = 0; customDiscountAmount = 0; iF.value = ''; 
      pendingOrderId = null; pendingOrderNo = null; // 清除結帳鎖定狀態
      updateCartUI();
      document.getElementById('checkout-success-overlay').classList.add('hidden');
      document.getElementById('checkout-sidebar').classList.add('translate-y-full');
      document.getElementById('checkout-btn').disabled = false; 
    };

    // --- 收銀員專用：將自助訂單載入 POS 結帳介面 ---
    window.resumePayment = function(id) {
      if (cart.length > 0 && !pendingOrderId) {
          if(!confirm("目前購物車內有未結帳商品，確定要放棄並載入這筆自助訂單嗎？")) return;
      }
      const order = allOrders.find(o => o.id === id);
      if(!order) return;
      
      // 深度拷貝訂單內容，進入結帳鎖定模式
      cart = JSON.parse(JSON.stringify(order.items)); 
      customDiscountAmount = order.discount || 0;
      pendingOrderId = id;
      pendingOrderNo = order.orderNumber;
      iF.value = ''; 
      
      updateCartUI();
      switchTab('pos'); 
      document.getElementById('checkout-sidebar').classList.remove('translate-y-full'); 
    };

    window.fetchHistory = async function() {
      const list = document.getElementById('history-list'); list.innerHTML = `<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>`;
      try {
        const snap = await getDocs(query(collection(db, "orders"), orderBy("timestamp", "desc"), limit(50)));
        list.innerHTML = snap.empty ? `<div class="text-center py-10 font-bold text-sm">尚無單據紀錄</div>` : snap.docs.map(docSnap => {
          const d = docSnap.data(); const t = d.timestamp ? d.timestamp.toDate().toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit'}) : '';
          const isVoid = d.status === 'voided';
          const isUnpaid = d.status === 'unpaid';
          
          let statusBadge = isVoid ? `<span class="text-[10px] bg-rose-100 text-rose-600 px-1.5 py-0.5 rounded ml-1">作廢</span>` : 
                            isUnpaid ? `<span class="text-[10px] bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded ml-1 animate-pulse">待付款</span>` : 
                            `<span class="text-[10px] bg-emerald-100 text-emerald-600 px-1.5 py-0.5 rounded ml-1">已結帳</span>`;

          let voidBtn = (currentUser && currentUser.role === 'admin' && !isVoid) ? `<button onclick="voidOrder('${docSnap.id}')" class="text-rose-500 hover:bg-rose-500 hover:text-white border border-rose-500 px-2 py-1 rounded text-[10px] font-bold transition mt-2">作廢</button>` : '';
          let resumeBtn = (isUnpaid && !isCustomerMode) ? `<button onclick="resumePayment('${docSnap.id}')" class="bg-blue-600 text-white px-3 py-1 rounded text-[10px] font-bold transition mt-2 mr-1 active:scale-95 shadow-sm"><i class="fa-solid fa-cash-register mr-1"></i>結帳收款</button>` : '';

          return `<div class="bg-white border ${isVoid ? 'border-rose-200 bg-rose-50/30' : (isUnpaid ? 'border-orange-300 shadow-md' : 'border-slate-200')} rounded-xl p-4 flex justify-between items-start shadow-sm transition">
              <div><div class="font-black text-lg ${isVoid ? 'text-slate-400 line-through' : 'text-slate-800'} mb-1">#${d.orderNumber} ${statusBadge} <span class="text-xs font-normal text-slate-400 ml-1">${t}</span></div>
              <div class="text-[10px] text-slate-500 mb-1">人員: ${d.operatorId} (${d.operatorGroup || '無'})</div>
              <div class="text-slate-600 text-xs leading-relaxed max-w-[180px]">${d.items.map(i=>`${i.name}x${i.qty}`).join(', ')}</div></div>
              <div class="text-right flex flex-col items-end"><div class="text-xl font-black ${isVoid ? 'text-slate-300' : 'text-blue-600'}">$${d.total}</div>
              <div class="flex">${resumeBtn}${voidBtn}</div></div>
            </div>`;
        }).join('');
      } catch (e) { list.innerHTML = `<div class="text-center text-rose-500 py-10 font-bold text-sm">讀取失敗</div>`; }
    };

    window.voidOrder = async function(id) {
      if(!confirm("確定要作廢本張訂單？系統會自動將該訂單所扣除的單品與套餐庫存全數加回！")) return;
      try {
        const oDoc = await getDoc(doc(db, "orders", id));
        if(oDoc.exists()) {
          const batch = writeBatch(db);
          batch.update(doc(db, "orders", id), { status: "voided" });
          oDoc.data().items.forEach(item => batch.update(doc(db, "products", item.id), { stock: increment(item.qty) }));
          await batch.commit(); alert("訂單已作廢，庫存已回滾！"); fetchHistory();
        }
      } catch(e) { alert("作廢失敗"); }
    };

    window.openProductModal = () => document.getElementById('product-modal').classList.remove('hidden');
    window.closeProductModal = () => { document.getElementById('product-modal').classList.add('hidden'); document.getElementById('new-prod-name').value=''; document.getElementById('new-prod-price').value=''; document.getElementById('new-prod-stock').value=''; };
    
    window.toggleComboSelection = function() {
      const type = document.getElementById('new-prod-type').value;
      document.getElementById('combo-items-section').classList.toggle('hidden', type !== 'combo');
    };

    function updateComboOptions() {
      const singles = products.filter(p => !p.isCombo);
      document.getElementById('combo-checkboxes-grid').innerHTML = singles.map(p => `
        <label class="flex items-center space-x-2 bg-white p-2 border rounded-lg cursor-pointer text-xs font-bold active:bg-slate-50 transition">
          <input type="checkbox" name="combo-components" value="${p.name}" class="w-3 h-3 text-orange-500">
          <span class="truncate">${p.name}</span>
        </label>
      `).join('');
    }

    window.saveNewProduct = async function() {
      const type = document.getElementById('new-prod-type').value;
      const n = document.getElementById('new-prod-name').value.trim(); 
      const p = parseInt(document.getElementById('new-prod-price').value); 
      const s = parseInt(document.getElementById('new-prod-stock').value);
      if(!n || isNaN(p) || isNaN(s)) return alert("請填寫完整的名稱、定價與初始庫存！");

      let comboComponents = [];
      if(type === 'combo') {
        const checked = document.querySelectorAll('input[name="combo-components"]:checked');
        checked.forEach(cb => comboComponents.push(cb.value));
        if(comboComponents.length === 0) return alert("套餐組合請至少勾選一項內含單品！");
      }

      try { 
        await addDoc(collection(db, "products"), { 
          name: n, price: p, stock: s, isCombo: (type === 'combo'), components: comboComponents, color: type === 'combo' ? 'bg-orange-50/70' : 'bg-white' 
        }); 
        alert("品項上架成功！前台點餐面板已同步。"); closeProductModal(); 
      } catch(e) { alert("上架失敗"); }
    };

    function renderInventory() {
      document.getElementById('inventory-list').innerHTML = products.map(p => {
        const typeBadge = p.isCombo ? '<span class="bg-orange-100 text-orange-700 px-2 py-0.5 rounded-md text-[10px] font-bold">套餐</span>' : '<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-md text-[10px] font-bold">單品</span>';
        const detailStr = p.isCombo ? `<div class="text-[10px] text-slate-400 mt-0.5 font-semibold">內含: ${p.components?.join(', ')}</div>` : '';
        return `<tr class="hover:bg-slate-50 border-b border-slate-100">
          <td class="p-3 text-center">${typeBadge}</td>
          <td class="p-3 font-bold text-slate-800"><div class="text-sm">${p.name}</div>${detailStr}</td>
          <td class="p-3 text-center font-mono text-blue-600 font-bold">$${p.price}</td>
          <td class="p-3 text-center font-bold ${p.stock < 10 ? 'text-rose-500 bg-rose-50/50' : 'text-emerald-600'}">${p.stock}</td>
          <td class="p-3 text-right space-x-1">
            <button onclick="addStock('${p.id}', 50)" class="bg-emerald-50 text-emerald-700 px-2 py-1.5 rounded text-xs font-bold active:scale-95 transition">+50</button>
            <button onclick="deleteProduct('${p.id}', '${p.name}')" class="bg-rose-50 text-rose-600 px-2 py-1.5 rounded text-xs font-bold active:scale-95 transition"><i class="fa-solid fa-trash-can"></i></button>
          </td>
        </tr>`;
      }).join('');
    }
    window.addStock = async (id, amt) => { try { await updateDoc(doc(db, "products", id), { stock: increment(amt) }); } catch(e) {} };
    window.deleteProduct = async function(id, name) {
      if(!confirm(`確定要下架刪除【${name}】？`)) return;
      try { await deleteDoc(doc(db, "products", id)); alert("已下架。"); } catch(e) { alert("刪除失敗"); }
    };

    window.fetchEmployees = async function() {
      const list = document.getElementById('employee-list');
      try {
        const snap = await getDocs(collection(db, "accounts"));
        employees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        list.innerHTML = employees.map(e => {
          const isRoot = e.id === 'admin';
          const delBtn = isRoot ? '<span class="text-[10px] text-slate-400 font-bold">保護</span>' : `<button onclick="deleteEmployee('${e.id}', '${e.name}')" class="text-rose-600 border border-rose-200 px-2 py-1 rounded text-xs font-bold active:bg-rose-50 transition">移除</button>`;
          return `<tr class="hover:bg-slate-50 border-b">
            <td class="p-3 font-mono font-bold text-slate-700 text-xs">${e.id}</td>
            <td class="p-3 font-bold text-slate-800 text-sm">${e.name}</td>
            <td class="p-3 text-center font-bold text-slate-600 text-xs">${e.group || '未分組'}</td>
            <td class="p-3 text-center font-mono font-bold text-slate-500 text-xs">${e.pin}</td>
            <td class="p-3 text-center"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${e.role==='admin'?'bg-orange-100 text-orange-700':'bg-blue-100 text-blue-700'}">${e.role==='admin'?'店長':'收銀'}</span></td>
            <td class="p-3 text-right">${delBtn}</td>
          </tr>`;
        }).join('');
      } catch(e){}
    };

    window.saveEmployee = async function() {
      const u = document.getElementById('emp-username').value.trim(); 
      const n = document.getElementById('emp-name').value.trim(); 
      const g = document.getElementById('emp-group').value.trim() || "未分組";
      const p = document.getElementById('emp-pin').value.trim(); 
      const r = document.getElementById('emp-role').value;
      if(!u || !n || p.length !== 4 || isNaN(p)) return alert("請填寫代號、名稱與4位數字PIN！");
      try {
        await setDoc(doc(db, "accounts", u), { pin: p, name: n, group: g, role: r });
        alert(`帳號配置成功！`);
        document.getElementById('emp-username').value=''; document.getElementById('emp-name').value=''; document.getElementById('emp-group').value=''; document.getElementById('emp-pin').value='';
        fetchEmployees();
      } catch(e) { alert("配置失敗"); }
    };

    window.deleteEmployee = async function(id, name) {
      if(!confirm(`確定要註銷並刪除 [${name}]？`)) return;
      try { await deleteDoc(doc(db, "accounts", id)); alert("已註銷。"); fetchEmployees(); } catch(e){}
    };

    window.getFilteredOrders = function() {
      const groupVal = document.getElementById('report-group-filter').value;
      const startVal = document.getElementById('report-start').value;
      const endVal = document.getElementById('report-end').value;
      
      // 報表只統計【非作廢】且【已付款】的訂單
      let validOrders = allOrders.filter(o => o.status !== 'voided' && o.status !== 'unpaid'); 
      
      if (groupVal !== 'all') {
        validOrders = validOrders.filter(o => o.operatorGroup === groupVal);
      }
      
      if(!startVal || !endVal) return validOrders.sort((a,b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0));
      
      const startMs = new Date(startVal).getTime();
      const endMs = new Date(endVal).getTime();
      
      return validOrders.filter(o => {
        if(!o.timestamp) return false;
        const oMs = o.timestamp.toDate().getTime();
        return oMs >= startMs && oMs <= endMs;
      }).sort((a,b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0));
    };

    window.generateReports = function() {
      const filtered = window.getFilteredOrders();
      const totalRev = filtered.reduce((sum, o) => sum + o.total, 0);
      document.getElementById('report-revenue').innerText = totalRev;
      document.getElementById('report-orders').innerText = filtered.length;

      document.getElementById('report-table-rows').innerHTML = filtered.length === 0 ? '<p class="text-slate-400 text-center py-6 text-sm">此選定區間/小組無單據</p>' : filtered.map(o => {
        const time = o.timestamp ? o.timestamp.toDate().toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit'}) : '剛剛';
        return `<div class="flex justify-between items-center border border-slate-100 p-2.5 rounded-xl bg-slate-50 text-xs font-medium">
          <div class="flex items-center space-x-2 overflow-hidden pr-2">
            <span class="font-black text-slate-800 shrink-0">#${o.orderNumber}</span>
            <span class="text-[10px] font-bold text-slate-400 shrink-0">${time}</span>
            <span class="bg-blue-100 text-blue-700 px-1 py-0.5 rounded text-[10px] shrink-0">${o.operatorGroup || '無'}</span>
            <span class="text-slate-600 truncate">${o.items.map(i=>`${i.name}x${i.qty}`).join(', ')}</span>
          </div>
          <div class="font-bold text-blue-600 shrink-0">$${o.total}</div>
        </div>`;
      }).join('');
    };

    window.clearReportFilter = function() { 
      document.getElementById('report-group-filter').value = 'all'; 
      document.getElementById('report-start').value = ''; 
      document.getElementById('report-end').value = ''; 
      generateReports(); 
    };

    window.printZReport = function() {
      const filtered = window.getFilteredOrders();
      const groupVal = document.getElementById('report-group-filter').value;
      
      document.getElementById('z-print-time').innerText = new Date().toLocaleString('zh-TW');
      document.getElementById('z-print-operator').innerText = currentUser.name;
      document.getElementById('z-print-group').innerText = groupVal === 'all' ? '全部小組' : groupVal;
      document.getElementById('z-print-start').innerText = document.getElementById('report-start').value || "當日開關帳起點";
      document.getElementById('z-print-end').innerText = document.getElementById('report-end').value || "當日開關帳終點";
      document.getElementById('z-print-revenue').innerText = filtered.reduce((sum, o) => sum + o.total, 0);
      document.getElementById('z-print-orders').innerText = filtered.length;
      window.print();
    };

    window.exportCSV = function() {
      const filtered = window.getFilteredOrders();
      if(filtered.length === 0) return alert("篩選時段內無資料！");
      
      let csvContent = "data:text/csv;charset=utf-8,\uFEFF單號,結帳時間,負責小組(班別),負責收銀員,商品名稱,單價,售出件數,該項小計,整單折讓(僅列於首筆),整單實收總額(僅列於首筆)\n";
      
      filtered.forEach(o => {
        const t = o.timestamp ? o.timestamp.toDate().toLocaleString('zh-TW') : '';
        const group = o.operatorGroup || '未分組';
        
        o.items.forEach((item, index) => {
          const discount = index === 0 ? (o.discount || 0) : '';
          const total = index === 0 ? o.total : '';
          const itemTotal = item.price * item.qty;
          
          csvContent += `${o.orderNumber},${t},${group},${o.operatorId},${item.name},${item.price},${item.qty},${itemTotal},${discount},${total}\n`;
        });
      });
      
      const link = document.createElement("a"); 
      link.setAttribute("href", encodeURI(csvContent)); 
      link.setAttribute("download", `進階營運銷貨報表.csv`); 
      document.body.appendChild(link); 
      link.click(); 
      document.body.removeChild(link);
    };

    window.factoryResetSystem = async function() {
      if(!confirm("警告：無法復原！\n確定要將所有的「交易紀錄」、「計數器」全部歸零清空嗎？")) return;
      const btn = document.getElementById('btn-factory-reset');
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i>抹除中...`; btn.disabled = true;
      try {
        const ordersSnap = await getDocs(collection(db, "orders")); const batch1 = writeBatch(db); ordersSnap.forEach(d => batch1.delete(d.ref)); await batch1.commit();
        const sessionSnap = await getDocs(collection(db, "active_sessions")); const batch2 = writeBatch(db); sessionSnap.forEach(d => batch2.delete(d.ref)); await batch2.commit();
        await setDoc(doc(db, "counters", "daily_order"), { count: 0 });
        alert("資料已歸零！"); location.reload();
      } catch(e) { alert("歸零失敗！"); } finally {
        btn.innerHTML = `<i class="fa-solid fa-dumpster-fire mr-2"></i> 清空資料・全部歸零`; btn.disabled = false;
      }
    };
  </script>
</body>
</html>
