<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧客確認與叫號螢幕</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { overflow: hidden; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  </style>
</head>
<body class="bg-slate-900 text-white h-screen w-screen flex font-sans">

  <div class="w-1/2 h-full flex flex-col border-r-2 border-slate-700 bg-slate-900 relative">
    
    <div class="p-6 flex flex-col h-full z-10">
      <div class="flex items-center space-x-3 mb-6 shrink-0">
        <i class="fa-solid fa-cart-shopping text-blue-500 text-3xl"></i>
        <h2 class="text-3xl font-black text-slate-200 tracking-wider">點餐明細</h2>
      </div>
      
      <div id="customer-list" class="flex-1 overflow-y-auto no-scrollbar space-y-4 pr-2"></div>
      
      <div class="shrink-0 pt-6 mt-4 border-t border-slate-700">
        <div class="flex justify-between items-end">
          <span class="text-2xl text-slate-400 font-bold">應付金額</span>
          <span class="text-7xl font-mono font-black text-blue-400">$<span id="customer-total">0</span></span>
        </div>
      </div>
    </div>

    <div id="success-overlay" class="absolute inset-0 z-20 bg-emerald-900 flex flex-col items-center justify-center hidden">
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-emerald-600/40 to-emerald-900"></div>
      
      <div class="z-30 flex flex-col items-center animate-pop-in">
        <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mb-6 shadow-2xl">
          <i class="fa-solid fa-check text-6xl text-emerald-600"></i>
        </div>
        <h2 class="text-4xl font-black text-white mb-2 tracking-widest">結帳成功！</h2>
        <p class="text-emerald-200 text-2xl font-bold mb-8">找零：$<span id="display-change" class="text-white">0</span></p>
        
        <div class="bg-white/10 backdrop-blur-md border border-white/20 p-8 rounded-3xl text-center w-80 shadow-2xl">
          <p class="text-emerald-300 text-lg font-bold tracking-widest mb-2">您的取餐單號</p>
          <div class="text-7xl font-black text-white tracking-tighter drop-shadow-lg">
            #<span id="display-order-no">000</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="w-1/2 h-full flex flex-col bg-slate-800">
    <div class="p-6 bg-slate-900/50 flex items-center space-x-3 shrink-0 shadow-md">
      <i class="fa-solid fa-bell-concierge text-yellow-400 text-3xl"></i>
      <h2 class="text-3xl font-black text-slate-200 tracking-wider">準備中 (待取餐)</h2>
    </div>
    
    <div class="flex-1 p-8 overflow-y-auto no-scrollbar">
      <div id="pending-orders-grid" class="grid grid-cols-3 gap-6">
        </div>
    </div>
  </div>

  <script type="module">
    import { db, doc, onSnapshot, collection } from './firebase-config.js';
    import { query, where, orderBy } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    // ----------------------------------------
    // 功能 1：左半邊即時購物車與結帳動畫
    // ----------------------------------------
    const sessionRef = doc(db, "active_sessions", "station_1");
    
    onSnapshot(sessionRef, (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        
        if (data.status === "completed") {
          document.getElementById('success-overlay').classList.remove('hidden');
          document.getElementById('display-order-no').innerText = data.orderNumber || '---';
          document.getElementById('display-change').innerText = data.change || '0';
          return; 
        }

        document.getElementById('success-overlay').classList.add('hidden');
        const cart = data.cartItems || [];
        document.getElementById('customer-total').innerText = data.totalAmount || 0;

        if (cart.length === 0) {
          document.getElementById('customer-list').innerHTML = `
            <div class="h-full flex flex-col items-center justify-center text-slate-500">
              <i class="fa-solid fa-mug-hot text-5xl mb-4 opacity-50"></i>
              <p class="text-xl tracking-widest font-bold">等待為您點餐</p>
            </div>`;
        } else {
          document.getElementById('customer-list').innerHTML = cart.map(item => `
            <div class="flex justify-between items-center bg-slate-800/80 p-5 rounded-2xl border border-slate-700 shadow-sm animate-pop-in">
              <span class="font-bold text-2xl text-slate-100">${item.name}</span>
              <div class="flex items-center space-x-6">
                <span class="text-slate-400 font-bold text-xl">x ${item.qty}</span>
                <span class="font-mono font-bold text-yellow-300 text-3xl w-24 text-right">$${item.price * item.qty}</span>
              </div>
            </div>`
          ).join('');
        }
      }
    });

    // ----------------------------------------
    // 功能 2：右半邊即時監聽「待取餐」訂單
    // ----------------------------------------
    const ordersRef = collection(db, "orders");
    const pendingQuery = query(ordersRef, where("status", "==", "pending"), orderBy("timestamp", "asc"));

    onSnapshot(pendingQuery, (snapshot) => {
      const grid = document.getElementById('pending-orders-grid');
      
      if (snapshot.empty) {
        grid.innerHTML = `<div class="col-span-3 text-center text-slate-500 mt-20 text-xl font-bold tracking-widest">目前沒有待取餐點</div>`;
        return;
      }

      grid.innerHTML = snapshot.docs.map(doc => {
        const orderNo = doc.data().orderNumber;
        return `
          <div class="bg-slate-700/50 border border-slate-600 rounded-3xl p-6 flex items-center justify-center shadow-lg animate-pop-in">
            <span class="text-5xl font-black text-white tracking-tighter">#${orderNo}</span>
          </div>
        `;
      }).join('');
    });
  </script>
</body>
</html>
