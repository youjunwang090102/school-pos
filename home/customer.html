<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧客確認與叫號螢幕 (旗艦版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { overflow: hidden; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    @keyframes popIn {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  </style>
</head>
<body class="bg-slate-900 text-white h-screen w-screen flex font-sans">

  <div class="w-1/2 h-full flex flex-col border-r-2 border-slate-700 bg-slate-900 relative">
    
    <div class="p-8 flex flex-col h-full z-10">
      <div class="flex items-center justify-between mb-8 shrink-0 border-b border-slate-800 pb-4">
        <div class="flex items-center space-x-4">
          <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg">
            <i class="fa-solid fa-desktop text-white text-2xl"></i>
          </div>
          <h2 class="text-3xl font-black text-slate-200 tracking-widest">請確認餐點</h2>
        </div>
      </div>
      
      <div id="customer-list" class="flex-1 overflow-y-auto no-scrollbar space-y-4 pr-2"></div>
      
      <div class="shrink-0 pt-6 mt-4 border-t border-slate-800 bg-slate-900">
        <div class="flex justify-between items-end">
          <span class="text-2xl text-slate-400 font-bold tracking-widest">總計</span>
          <span class="text-7xl font-mono font-black text-emerald-400 drop-shadow-md">
            $<span id="customer-total">0</span>
          </span>
        </div>
      </div>
    </div>

    <div id="success-overlay" class="absolute inset-0 z-20 bg-emerald-900 flex flex-col items-center justify-center hidden transition-opacity duration-300">
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-emerald-500/30 via-emerald-800 to-emerald-950"></div>
      
      <div class="z-30 flex flex-col items-center animate-pop-in">
        <div class="w-32 h-32 bg-white rounded-full flex items-center justify-center mb-6 shadow-[0_0_50px_rgba(52,211,153,0.5)]">
          <i class="fa-solid fa-check text-7xl text-emerald-600"></i>
        </div>
        <h2 class="text-5xl font-black text-white mb-2 tracking-widest">結帳成功！</h2>
        <p class="text-emerald-200 text-3xl font-bold mb-10">找零：$<span id="display-change" class="text-white">0</span></p>
        
        <div class="bg-white/10 backdrop-blur-md border border-white/20 p-8 rounded-3xl text-center w-96 shadow-2xl">
          <p class="text-emerald-300 text-xl font-bold tracking-widest mb-2">您的取餐單號</p>
          <div class="text-8xl font-black text-white tracking-tighter drop-shadow-2xl">
            #<span id="display-order-no">000</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="w-1/2 h-full flex flex-col bg-slate-800">
    
    <div class="h-1/2 flex flex-col border-b-2 border-slate-700 bg-slate-800">
      <div class="p-5 bg-slate-900/50 flex items-center justify-between shrink-0 shadow-md">
        <div class="flex items-center space-x-3">
          <i class="fa-solid fa-fire text-orange-400 text-2xl"></i>
          <h2 class="text-2xl font-black text-slate-200 tracking-widest">準備中 <span class="text-sm font-normal text-slate-500 ml-2 uppercase">Preparing</span></h2>
        </div>
      </div>
      <div class="flex-1 p-6 overflow-y-auto no-scrollbar">
        <div id="pending-orders-grid" class="grid grid-cols-4 gap-4"></div>
      </div>
    </div>

    <div class="h-1/2 flex flex-col bg-slate-900 relative">
      <div class="absolute inset-0 bg-emerald-900/10 pointer-events-none"></div>
      <div class="p-5 bg-slate-950 flex items-center justify-between shrink-0 shadow-md z-10 border-b border-emerald-900/50">
        <div class="flex items-center space-x-3">
          <i class="fa-solid fa-bell text-emerald-400 text-2xl animate-bounce"></i>
          <h2 class="text-2xl font-black text-emerald-400 tracking-widest">請取餐 <span class="text-sm font-normal text-emerald-700 ml-2 uppercase">Ready</span></h2>
        </div>
      </div>
      <div class="flex-1 p-6 overflow-y-auto no-scrollbar z-10">
        <div id="ready-orders-grid" class="grid grid-cols-3 gap-6"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { db, doc, onSnapshot, collection } from './firebase-config.js';
    import { query, where, orderBy } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    // --- 左半邊結帳動畫邏輯 ---
    const sessionRef = doc(db, "active_sessions", "station_1");
    onSnapshot(sessionRef, (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        
        if (data.status === "completed") {
          document.getElementById('success-overlay').classList.remove('hidden');
          document.getElementById('display-order-no').innerText = data.orderNumber || '---';
          document.getElementById('display-change').innerText = data.change || '0';
          return; 
        }

        document.getElementById('success-overlay').classList.add('hidden');
        const cart = data.cartItems || [];
        document.getElementById('customer-total').innerText = data.totalAmount || 0;

        if (cart.length === 0) {
          document.getElementById('customer-list').innerHTML = `
            <div class="h-full flex flex-col items-center justify-center text-slate-500">
              <i class="fa-solid fa-hand-sparkles text-6xl mb-6 opacity-50 animate-pulse"></i>
              <p class="text-2xl tracking-widest font-bold">歡迎光臨，等待點餐中</p>
            </div>`;
        } else {
          document.getElementById('customer-list').innerHTML = cart.map((item, index) => `
            <div class="flex justify-between items-center bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-lg animate-pop-in" style="animation-delay: ${index * 0.05}s">
              <span class="font-bold text-2xl text-slate-100">${item.name}</span>
              <div class="flex items-center space-x-8">
                <span class="text-slate-400 font-bold text-xl">x ${item.qty}</span>
                <span class="font-mono font-bold text-yellow-300 text-3xl w-24 text-right drop-shadow-md">$${item.price * item.qty}</span>
              </div>
            </div>`
          ).join('');
        }
      }
    });

    // --- 右半邊監聽邏輯 ---
    const ordersRef = collection(db, "orders");
    
    // 監聽 pending (準備中)
    onSnapshot(query(ordersRef, where("status", "==", "pending"), orderBy("timestamp", "asc")), (snapshot) => {
      const grid = document.getElementById('pending-orders-grid');
      grid.innerHTML = snapshot.empty 
        ? `<div class="col-span-4 text-center text-slate-500 mt-10 text-lg font-bold tracking-widest">目前無準備中餐點</div>`
        : snapshot.docs.map(doc => `
          <div class="bg-slate-700/50 border border-slate-600 rounded-2xl py-5 flex justify-center items-center shadow-inner animate-pop-in">
            <span class="text-4xl font-black text-slate-300 tracking-tighter">${doc.data().orderNumber}</span>
          </div>
        `).join('');
    });

    // 監聽 ready (請取餐)
    onSnapshot(query(ordersRef, where("status", "==", "ready"), orderBy("timestamp", "asc")), (snapshot) => {
      const grid = document.getElementById('ready-orders-grid');
      grid.innerHTML = snapshot.empty 
        ? `<div class="col-span-3 text-center text-emerald-900 mt-10 text-lg font-bold tracking-widest">目前無待取餐點</div>`
        : snapshot.docs.map(doc => `
          <div class="bg-emerald-900/80 border-2 border-emerald-500/50 rounded-3xl py-8 flex justify-center items-center shadow-[0_0_20px_rgba(16,185,129,0.3)] animate-pop-in">
            <span class="text-6xl font-black text-emerald-400 tracking-tighter drop-shadow-lg">${doc.data().orderNumber}</span>
          </div>
        `).join('');
    });
  </script>
</body>
</html>
