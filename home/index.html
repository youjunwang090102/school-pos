<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS 收銀台</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 flex flex-col md:flex-row gap-8 font-sans">
  <div class="flex-1">
    <h2 class="text-2xl font-bold mb-4">收銀點餐區</h2>
    <div class="grid grid-cols-2 gap-4">
      <button onclick="addToCart('珍奶', 45)" class="bg-blue-100 hover:bg-blue-200 p-6 rounded-xl font-bold text-xl shadow">珍珠奶茶 $45</button>
      <button onclick="addToCart('雞排', 75)" class="bg-orange-100 hover:bg-orange-200 p-6 rounded-xl font-bold text-xl shadow">香酥雞排 $75</button>
      <button onclick="addToCart('薯條', 40)" class="bg-yellow-100 hover:bg-yellow-200 p-6 rounded-xl font-bold text-xl shadow">黃金脆薯 $40</button>
    </div>
    <button onclick="clearCart()" class="mt-8 bg-gray-500 text-white px-6 py-3 rounded-lg font-bold shadow hover:bg-gray-600">清空訂單</button>
  </div>
  
  <div class="w-full md:w-1/3 bg-white p-6 rounded-xl shadow-lg border flex flex-col">
    <h2 class="text-xl font-bold mb-4 border-b pb-2">當前購物車</h2>
    <div id="cart-ui" class="flex-1 min-h-[200px] mb-4 space-y-2 overflow-y-auto"></div>
    <div class="text-2xl font-bold text-blue-600 border-t pt-4 mb-4">總計: $<span id="total-ui">0</span></div>
    
    <button onclick="checkout()" class="w-full bg-green-500 text-white py-4 rounded-xl text-xl font-bold shadow-lg hover:bg-green-600 transition active:scale-95">
      確認結帳
    </button>
  </div>

  <script type="module">
    // 引入剛擴充的 collection, addDoc, serverTimestamp
    import { db, doc, setDoc, collection, addDoc, serverTimestamp } from './firebase-config.js';
    
    let cart = [];
    let total = 0;

    window.addToCart = function(name, price) {
      const existing = cart.find(item => item.name === name);
      if (existing) existing.qty += 1;
      else cart.push({ name, price, qty: 1 });
      updateUIAndDatabase();
    };

    window.clearCart = function() {
      cart = [];
      updateUIAndDatabase();
    };

    // ✨ 新增的結帳邏輯
    window.checkout = async function() {
      if (cart.length === 0) return alert("購物車是空的！");

      try {
        // 1. 將整筆訂單正式寫入 orders 集合
        await addDoc(collection(db, "orders"), {
          items: cart,
          total: total,
          timestamp: serverTimestamp() // 使用 Firebase 伺服器時間，防作弊
        });

        // 2. 結帳成功，清空購物車與顧客螢幕
        alert(`結帳成功！總共收您 $${total} 元`);
        cart = [];
        updateUIAndDatabase(); 
      } catch (e) {
        console.error("結帳失敗：", e);
        alert("結帳失敗，請檢查網路連線。");
      }
    };

    async function updateUIAndDatabase() {
      total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      document.getElementById('total-ui').innerText = total;
      document.getElementById('cart-ui').innerHTML = cart.map(item => 
        `<div class="flex justify-between border-b py-2">
          <span>${item.name} x ${item.qty}</span>
          <span class="font-bold">$${item.price * item.qty}</span>
         </div>`
      ).join('');

      try {
        const sessionRef = doc(db, "active_sessions", "station_1");
        await setDoc(sessionRef, { cartItems: cart, totalAmount: total, timestamp: new Date() });
      } catch (e) {}
    }
  </script>
</body>
</html>
