<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>POS 收銀台 (Pro)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { touch-action: none; user-select: none; -webkit-user-select: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="bg-slate-100 h-screen w-screen overflow-hidden flex flex-col font-sans text-slate-800">

  <header class="bg-slate-900 text-white p-3 flex justify-between items-center shrink-0 z-20 shadow-md">
    <div class="flex items-center space-x-3">
      <div class="bg-blue-600 p-2 rounded-lg"><i class="fa-solid fa-cash-register"></i></div>
      <h1 class="text-lg font-bold tracking-wider">ClassPOS Pro</h1>
      <span id="live-clock" class="ml-4 text-sm font-mono text-slate-400">載入中...</span>
    </div>
    <div class="flex items-center space-x-4 text-sm font-semibold">
      <span class="text-emerald-400"><i class="fa-solid fa-wifi mr-1"></i>已連線</span>
      <div class="bg-slate-800 px-3 py-1 rounded-full border border-slate-700">第一組 收銀員</div>
    </div>
  </header>

  <main class="flex-1 flex overflow-hidden">
    
    <section class="flex-1 flex flex-col border-r border-slate-200 bg-slate-50 relative">
      <div class="p-4 bg-white border-b border-slate-200 shadow-sm z-10 shrink-0">
        <h2 class="text-xl font-bold text-slate-700"><i class="fa-solid fa-mug-hot mr-2"></i>商品選單</h2>
      </div>
      
      <div class="flex-1 p-4 overflow-y-auto no-scrollbar">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-20">
          <div class="col-span-full text-center text-slate-400 py-10 animate-pulse">載入雲端商品中...</div>
        </div>
      </div>
    </section>

    <section class="w-full md:w-[400px] flex flex-col bg-white shadow-2xl z-20 shrink-0">
      
      <div class="bg-slate-50 border-b border-slate-200 p-3 flex justify-between items-center shrink-0">
        <h2 class="font-bold text-slate-700">當前訂單</h2>
        <button onclick="clearCart()" class="text-rose-500 hover:text-rose-600 text-sm font-bold bg-rose-50 px-3 py-1 rounded-full transition"><i class="fa-solid fa-trash-can mr-1"></i>清空</button>
      </div>
      
      <div id="cart-ui" class="flex-1 p-3 overflow-y-auto no-scrollbar bg-white space-y-2"></div>

      <div class="border-t border-slate-200 bg-slate-50 p-4 shrink-0 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
        <div class="flex justify-between items-end mb-3">
          <span class="text-slate-500 font-bold text-sm">總計金額</span>
          <span class="text-3xl font-black text-blue-600 tracking-tight">NT$ <span id="total-ui">0</span></span>
        </div>
        
        <input type="text" id="received-amount" readonly placeholder="實收金額" class="w-full bg-white border-2 border-slate-300 rounded-xl p-3 text-2xl font-bold text-center text-slate-800 mb-3 focus:border-blue-500 focus:outline-none shadow-inner">

        <div class="grid grid-cols-4 gap-2 mb-3">
          <button onclick="numpadInput(1)" class="bg-white border border-slate-200 rounded-lg py-3 text-xl font-bold text-slate-700 shadow-sm active:scale-95 transition">1</button>
          <button onclick="numpadInput(2)" class="bg-white border border-slate-200 rounded-lg py-3 text-xl font-bold text-slate-700 shadow-sm active:scale-95 transition">2</button>
          <button onclick="numpadInput(3)" class="bg-white border border-slate-200 rounded-lg py-3 text-xl font-bold text-slate-700 shadow-sm active:scale-95 transition">3</button>
          <button onclick="setReceived(100)" class="bg-blue-50 border border-blue-200 rounded-lg py-3 text-lg font-bold text-blue-700 shadow-sm active:scale-95 transition">$100</button>
          
          <button onclick="numpadInput(4)" class="bg-white border border-slate-200 rounded-lg py-3 text-xl font-bold text-slate-700 shadow-sm active:scale-95 transition">4</button>
          <button onclick="numpadInput(5)" class="bg-white border border-slate-200 rounded-lg py-3 text-xl font-bold text-slate-700 shadow-sm active:scale-95 transition">5</button>
          <button onclick="numpadInput(6)" class="bg-white border border-slate-200 rounded-lg py-3 text-xl font-bold text-slate-700 shadow-sm active:scale-95 transition">6</button>
          <button onclick="setReceived(500)" class="bg-blue-50 border border-blue-200 rounded-lg py-3 text-lg font-bold text-blue-700 shadow-sm active:scale-95 transition">$500</button>
          
          <button onclick="numpadInput(7)" class="bg-white border border-slate-200 rounded-lg py-3 text-xl font-bold text-slate-700 shadow-sm active:scale-95 transition">7</button>
          <button onclick="numpadInput(8)" class="bg-white border border-slate-200 rounded-lg py-3 text-xl font-bold text-slate-700 shadow-sm active:scale-95 transition">8</button>
          <button onclick="numpadInput(9)" class="bg-white border border-slate-200 rounded-lg py-3 text-xl font-bold text-slate-700 shadow-sm active:scale-95 transition">9</button>
          <button onclick="setReceived(1000)" class="bg-blue-50 border border-blue-200 rounded-lg py-3 text-lg font-bold text-blue-700 shadow-sm active:scale-95 transition">$1000</button>
          
          <button onclick="numpadClear()" class="bg-rose-50 border border-rose-200 rounded-lg py-3 text-xl font-bold text-rose-600 shadow-sm active:scale-95 transition">C</button>
          <button onclick="numpadInput(0)" class="bg-white border border-slate-200 rounded-lg py-3 text-xl font-bold text-slate-700 shadow-sm active:scale-95 transition">0</button>
          <button onclick="numpadBackspace()" class="bg-slate-200 border border-slate-300 rounded-lg py-3 text-xl font-bold text-slate-700 shadow-sm active:scale-95 transition"><i class="fa-solid fa-delete-left"></i></button>
          <button id="btn-exact" onclick="setExactAmount()" class="bg-emerald-50 border border-emerald-200 rounded-lg py-3 text-lg font-bold text-emerald-700 shadow-sm active:scale-95 transition">剛好</button>
        </div>

        <div class="bg-blue-900 text-white rounded-xl flex justify-between items-center p-3 mb-3 shadow-inner">
          <span class="font-bold text-blue-200 text-sm">應找零</span>
          <span class="text-2xl font-black tracking-wider" id="change-amount">$ 0</span>
        </div>

        <button onclick="checkout()" id="checkout-btn" class="w-full bg-emerald-500 text-white py-4 rounded-xl text-xl font-bold shadow-[0_4px_14px_0_rgba(16,185,129,0.39)] hover:bg-emerald-600 hover:shadow-[0_6px_20px_rgba(16,185,129,0.23)] transition duration-200 active:scale-[0.98] disabled:bg-slate-300 disabled:shadow-none flex justify-center items-center">
          <i class="fa-solid fa-check-circle mr-2"></i> 確認結帳
        </button>
      </div>
    </section>
  </main>

  <script type="module">
    import { db, doc, setDoc, onSnapshot, collection, addDoc, serverTimestamp } from './firebase-config.js';
    import { writeBatch, increment } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    let products = [];
    let cart = [];
    let total = 0;

    // 時鐘初始化
    setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleString('zh-TW', { hour12: false }); }, 1000);

    // ==========================================
    // 1. 雲端商品資料處理
    // ==========================================
    const productsRef = collection(db, "products");
    
    onSnapshot(productsRef, async (snapshot) => {
      // 系統自動初始化功能：如果資料庫是空的，自動塞入預設商品
      if (snapshot.empty) {
        console.log("初始化預設商品...");
        const batch = writeBatch(db);
        const defaultItems = [
          { name: '招牌珍珠奶茶', price: 45, stock: 50, color: 'bg-orange-50' },
          { name: '冰檸檬紅茶', price: 35, stock: 40, color: 'bg-yellow-50' },
          { name: '香酥炸雞排', price: 75, stock: 20, color: 'bg-amber-100' },
          { name: '黃金脆薯', price: 40, stock: 15, color: 'bg-yellow-100' }
        ];
        defaultItems.forEach(item => {
          const newDocRef = doc(productsRef);
          batch.set(newDocRef, item);
        });
        await batch.commit();
        return; // 寫入後會再次觸發 onSnapshot
      }

      products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderProducts();
      updateCartUI(); // 確保庫存更新時，購物車狀態也同步
    });

    function renderProducts() {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = products.map(p => {
        const isSoldOut = p.stock <= 0;
        const opacity = isSoldOut ? 'opacity-50 grayscale cursor-not-allowed' : 'cursor-pointer hover:-translate-y-1 hover:shadow-lg active:scale-95 transition-all duration-200';
        return `
          <div onclick="${isSoldOut ? '' : `addToCart('${p.id}')`}" class="relative border border-slate-200 rounded-2xl p-4 flex flex-col justify-between h-36 ${p.color || 'bg-white'} ${opacity} shadow-sm overflow-hidden">
            <div class="relative z-10">
              <h3 class="font-bold text-slate-800 text-lg leading-tight drop-shadow-sm">${p.name}</h3>
              <p class="text-blue-700 font-black mt-1 text-xl drop-shadow-sm">$${p.price}</p>
            </div>
            <div class="relative z-10 text-right text-sm font-bold ${p.stock > 10 ? 'text-slate-500' : 'text-rose-600 bg-rose-100 inline-block px-2 py-0.5 rounded-lg float-right'}">
              ${isSoldOut ? '已售完' : `庫存: ${p.stock}`}
            </div>
          </div>
        `;
      }).join('');
    }

    // ==========================================
    // 2. 購物車邏輯
    // ==========================================
    window.addToCart = function(id) {
      const product = products.find(p => p.id === id);
      const existing = cart.find(item => item.id === id);
      const currentQty = existing ? existing.qty : 0;
      
      if (currentQty >= product.stock) return; // 阻擋超過庫存
      
      if (existing) existing.qty += 1;
      else cart.push({ ...product, qty: 1 });
      
      updateCartUI();
    };

    window.changeQty = function(id, delta) {
      const item = cart.find(i => i.id === id);
      const product = products.find(p => p.id === id);
      if (!item) return;
      
      if (delta > 0 && item.qty >= product.stock) return;
      item.qty += delta;
      
      if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
      updateCartUI();
    };

    window.clearCart = function() {
      cart = [];
      document.getElementById('received-amount').value = '';
      updateCartUI();
    };

    async function updateCartUI() {
      total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      document.getElementById('total-ui').innerText = total;
      document.getElementById('btn-exact').innerText = total > 0 ? `剛好 $${total}` : '剛好';
      
      const cartContainer = document.getElementById('cart-ui');
      if (cart.length === 0) {
        cartContainer.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-300"><i class="fa-solid fa-basket-shopping text-4xl mb-2"></i><p>請點擊左側商品</p></div>`;
      } else {
        cartContainer.innerHTML = cart.map(item => `
          <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-200 shadow-sm">
            <div class="flex-1 font-bold text-slate-700">${item.name}</div>
            <div class="flex items-center space-x-3 mx-2 bg-slate-100 rounded-lg p-1 border border-slate-200">
              <button onclick="changeQty('${item.id}', -1)" class="w-8 h-8 bg-white rounded shadow-sm text-slate-600 font-bold active:scale-90">-</button>
              <span class="w-6 text-center font-bold text-slate-800">${item.qty}</span>
              <button onclick="changeQty('${item.id}', 1)" class="w-8 h-8 bg-blue-100 rounded shadow-sm text-blue-700 font-bold active:scale-90">+</button>
            </div>
            <div class="w-16 text-right font-black text-blue-600 text-lg">$${item.price * item.qty}</div>
          </div>
        `).join('');
      }

      calculateChange();

      // 推送至顧客螢幕
      try {
        await setDoc(doc(db, "active_sessions", "station_1"), { 
          cartItems: cart, totalAmount: total, timestamp: new Date(), status: "ordering" 
        });
      } catch (e) { console.error("同步顧客螢幕失敗", e); }
    }

    // ==========================================
    // 3. 數字鍵盤與找零計算
    // ==========================================
    const inputField = document.getElementById('received-amount');

    window.numpadInput = function(num) {
      if (inputField.value === '0') inputField.value = num;
      else inputField.value += num;
      calculateChange();
    };
    window.setReceived = function(amount) { inputField.value = amount; calculateChange(); };
    window.setExactAmount = function() { if (total > 0) setReceived(total); };
    window.numpadBackspace = function() { inputField.value = inputField.value.slice(0, -1); calculateChange(); };
    window.numpadClear = function() { inputField.value = ''; calculateChange(); };

    function calculateChange() {
      const received = parseInt(inputField.value) || 0;
      const changeDisplay = document.getElementById('change-amount');
      const checkoutBtn = document.getElementById('checkout-btn');

      if (cart.length === 0) {
        changeDisplay.innerText = '$ 0';
        checkoutBtn.disabled = true;
        return;
      }

      if (inputField.value === '') {
        changeDisplay.innerText = '$ 0';
        changeDisplay.className = 'text-2xl font-black tracking-wider text-blue-200';
        checkoutBtn.disabled = false; // 允許直接結帳
      } else if (received >= total) {
        changeDisplay.innerText = '$ ' + (received - total);
        changeDisplay.className = 'text-2xl font-black tracking-wider text-emerald-400';
        checkoutBtn.disabled = false;
      } else {
        changeDisplay.innerText = '金額不足';
        changeDisplay.className = 'text-2xl font-black tracking-wider text-rose-400';
        checkoutBtn.disabled = true;
      }
    }

    // ==========================================
    // 4. 結帳與庫存扣減 (Batch 原子操作)
    // ==========================================
    window.checkout = async function() {
      if (cart.length === 0) return;
      const received = parseInt(inputField.value) || total;

      try {
        const batch = writeBatch(db);

        // 1. 寫入歷史訂單
        const orderRef = doc(collection(db, "orders"));
        batch.set(orderRef, {
          items: cart,
          total: total,
          received: received,
          change: received - total,
          timestamp: serverTimestamp()
        });

        // 2. 扣除庫存
        cart.forEach(item => {
          const pRef = doc(db, "products", item.id);
          batch.update(pRef, { stock: increment(-item.qty) });
        });

        // 3. 通知顧客螢幕顯示「結帳成功」
        const sessionRef = doc(db, "active_sessions", "station_1");
        batch.set(sessionRef, { cartItems: [], totalAmount: 0, status: "completed", change: received - total });

        await batch.commit();

        // 結帳後重置畫面
        cart = [];
        inputField.value = '';
        updateCartUI();

      } catch (e) {
        console.error("結帳失敗：", e);
        alert("結帳失敗，請檢查網路！");
      }
    };
  </script>
</body>
</html>
